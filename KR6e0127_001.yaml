body:
  text: 義同教三述同教䇿斥前二非立一同教因茲偽説矯誤末流舛習訛浸不間經論照元真唯事干戈增鬪諍背違佛祖片執師承雖隻刀高呼而衆咻絶和歎時機之薄惡嗟正法以漸沉輒釋雲華融會章庶通賢首分齊記炷香灼化投入法性海中結志禱祈願丐聖心加被參玄者取悟本心達識者無黨檮杭發明正知見期報佛祖恩乾道七坐夏玉岑因讀教章聊志云耳今釋融會章科分為二初釋總題二解本文且初釋題次題述人題曰融會一乘義四十無礙辨才後釋融會三乘決顯明一乘之妙趣解曰初五字標題次八字指文釋義指華嚴第九地説無礙辨才後經文明顯也故賢首曰此地中作大法師明説法儀軌是故開示一乘三乘文義差別也次十二字略釋融會融即融和會即會取以一乘法體根本智為能融能會以所流三乘法義為所融所會此乃大聖善巧方便引攝融會三乘令證本源決顯一乘知真妙趣也故清涼釋彼經曰會三乘同歸一實解脫相中無差別故次顯述人李唐終南山至相寺釋智儼述即華嚴第四祖也山名寺號祖德行門具如傳記二解本文取例經科大節分三初序説由致分二正明同別分三流通指廣分且初序説由致分文復有七初歎德宗理具同別章曰夫圓通之法以具德為宗緣起理實用二門取會其二門者所謂同別二教也解曰夫者發語之端歎法之始乃歎華嚴圓通性海妙德難思宗本體用緣起無邊理實鎔融一三無礙機開本末教被同別一法普收二門取會二門者同別二教門也二列同別各開本末且初別教本末復二初標本別末章曰別教者別於三乘解曰別者逈異之義詺華嚴經宗本一乘是諸佛衆生平等本有廣大智慧具足教義理事境智行位因果依生體用人法逆順應感等十法門義各各具十十十無盡為諸教本本法圓融具足末伴一乘法本別別無盡逈異一代諸眷屬經中小乘三乘末教所詮偏圓頓漸權實教義等十法門雖從本流而末即圓一相孤門名方便教亦名同教亦名末教賢首約五教相攝融通中曰一或總為一謂本末鎔融唯一大善巧法二或開為二一本教謂別教一乘為諸教本故二末教謂小乘三乘從彼所流故又名究竟及方便以三乘小乘望一乘悉為方便故特述教章首立分相門顯別教一乘為本揀餘三乘為末列十差別就後通揀曰其別教一乘所明行位因果等相與彼三乘教施設分齊全別不同廣在經文略如下辨次立該攝門顯法鎔融該末即本一切三乘本來悉是彼一乘法融通有二所以具如彼章六祖清涼遵用二門但改分相為全揀該攝為全收亦以人法融通深廣無礙總屬圓教也七祖圭山亦曰大疏玄談全揀諸宗即別教性起義全收諸宗即同教緣起義然約機約法故開二門既人法融通二亦交徹二門不二統為華嚴圓宗真界生起萬法之義也今謂圭山將全收為同教緣起至華嚴本教大法界緣起即成性起緣性相由皆不思議正顯別教中具圓通同義十無盡同也故四祖曰又一乘同法對智以彰同若引機以會同則同同具十即窮無盡又云別同之中亦有同別由多即一是其同也會復二師諍如後辨已上四五六七四大祖師師資遵承皆以分相該攝二門具顯華嚴本法本教頓説頓圓稱性本末一一逈別故決擇第十門曰或有衆生於一乘別教解行滿足已證入果海者即見上來諸教並是無盡性海隨緣所成更無異事等故賢首正立教中約乘法以分三宗揀異本末曰初一即愚法二乘後一即別教一乘中間三者雖頓終始三權實之異總為一三乘教以皆為三人所得故等是知前四教皆為末教後一圓別為本教也然中間終頓二教雖展轉深勝共談一性一相而由形對一亦名三故六祖玄文曰三四二教雖則泯二異前而形對顯一曲巧順機故演義釋曰三即終教四即頓教此之二教具明一乘故名泯二異前始教存三乘也而言雖者雖明一乘由是對三故同前二亦屈由之數則前四皆屈曲收後之一教方是平道為諸教本也又曰四為教本者謂非海無以潛流非本無以垂末將欲逐機漸施末教先示本法頓演此經等是知究竟一乘為稱法本教別前四教三乘皆為末教也故科曰標本別末矣二指經會末章曰故法華經云三界外別索大牛之車故也解曰良以法華最後開顯雖則異時異處而與本教作方便故隨機屈曲破三顯一會異歸同會彼同時異處三乘不定之機也能會是法華方便一乘所會是始權終實三乘但會漸機淘練漸熟從漸入一故得界外別索大牛之車歸一佛慧也歸法華佛慧即是歸華嚴佛慧也故清涼曰法華攝諸經歸華嚴以別該同皆圓教攝又曰二經化儀則異化法無殊今以法華化法同本化儀攝末本末交映興奪相資方為攝生之善巧則為攝末歸本也若爾如何清涼於辨違中不許唐吉藏判法華為攝末歸本法輪耶答不許吉藏者以彼全約化儀失據法但有大小同前讖師半滿失昧經別為一類滯小失故演義釋彼違曰今此師立唯約化儀據法但有大小同前半滿亦攝義不足又曰自是立教之人不得法華之意別為一類滯小之人是知吉藏雖判為攝末歸本法輪而具上三失攝義不足也今家所判語同義別也今以法華約化法旨華嚴為法本故清涼曰於一佛乘説無量乘故彼經云諸佛以方便力於一佛乘分別説三又云吾從成佛已來種種因緣種種譬喻無量方便引導衆生即從本流末也約化儀則最後開顯破小顯大會三歸一故清涼曰雖有衆多即攝末歸本故彼經云以無量無數方便演説諸法皆為一佛乘故又云汝等所行是菩薩道又云究竟至於一切種智故皆佛因是知法華依實開權説一即多會權歸實説多即一是故以法華方便一乘為攝末之本也又四祖述一乘三乘義章曰又一乘義分別有二一者正乘如華嚴經説二者方便乘分別有十初之七對依如來藏勝鬘楞伽等經後三對依法華經分別一乘同無盡三乘即不定乃至結曰上來所辨於眷屬經中欲顯圓通無盡法藏一乘教義故於方便之處示一乘名今進入者易得解故作如是説等又曰上件法門攝下諸教頓屬其上分本教義漸從其末義乃至曰及三乘終教寂照照寂一相真如并初教門染淨即空愚法小乘苦諦之教等明知法華雙會權實並小三乘也若爾如何清涼玄文却云法華但會昔權故説三皆虗指昔實不滯方便故不會之今言終實皆為所會者何違祖耶答彼斥梁朝光宅法師依法華立四乘教故辨其所違故作此語緣此師以臨門三車為權四衢等賜即實唯説法華為實不知抑諸般若等了義經也是於昔大不分權實故成抑諸實教過耳今為會通教旨則不如是是故演義大節有三初明會不會之意以臨門三車施設方便引昔權三皆無實體正當會義故疏曰但會昔權故説三皆虗指不會昔實者昔實已在般若等經開顯實理故疏曰昔實不滯方便故不會之第二明會二會三之意演義釋曰二俱有理破小顯大即是會二會權歸實即是會三也第三明取昔廢昔之意疏曰若開權顯實則三是一更無別一鈔釋有其二義先明會三為一次明會三歸一且先會三為一者會取昔權無體之三為其開顯理行果法並從一實皆是佛因故名取昔也廢昔者廢昔三教並廢隨從各異今從開廢之後知三即一心生歡喜自知作佛則是實相顯是故下鈔先引藥草喻品證小行即是佛因次引信解品證大行是其所有乃至曰今疏欲會三因同為一因故引二文皆明會行故曰會三為一也次明會三歸一者疏曰若廢權立實義説為四如攬三點以成一伊等演義曰若廢下明會昔三歸今之一於中二先會昔成今有法喻合法云義説為四者以但廢昔三教言三是權一實便顯三外無別一實之法云義説為四但三為別一為總耳如攬三點下喻斯借涅槃第二三點成伊等乃至曰今借其喻不取其法謂以三點喻於三乘以成一伊喻為一乘別説三乘三皆是權合三為一故得稱實非三點外更有一點乃至曰總合為一故成四也次疏曰若依昔未顯説一切具有如來知見根販之種今並説成則今昔有異故演義釋曰若依昔下第二彰今異昔前但合三為一一無別法已成四乘今辨一乘別有法門則四義昭著是為昔所未説而今説之聞所未聞未曾有法也謂昔雖有大乘亦説如來藏性涅槃法身真常之理未曾顯説一切衆生皆悉具有如來知見唯為一事出現於世不為於餘故睿公云至如般若諸經深無不極故道者以之而歸大無不包故乘者以之而運然其大略皆以適化為本應勸之門不得不以善權與用權之與化悟物雖弘於實體不定皆屬法華固其宜矣已上三義會通法華教旨大意唯顯會三歸一然以會機初後有二初立會昔成今義是初方便門會權歸實名會三為一義説四乘以顯三一和合同此是清涼義也正如教章二明攝益中曰若先以三乘令其得出後乃方便得一乘者此即一乘三乘和合説故屬同教攝乃至曰攝機成二益等及至次擇中第七門曰或有衆生於此世中三乘根不定故堪進入同教一乘者即見自所得三乘之法皆依一乘無盡教起是彼方便阿含施設是故諸有所修皆回向一乘如會三歸一等此是賢首義又如至相橫依方便中第二義曰與彼究竟圓一乘為方便説一乘非即圓通自在也此是四祖義次立彰今異昔義是後示真實相露地授大車唯顯一乘不為於餘此是清涼義又如決擇第八門曰或有衆生於此世中三乘根不定故堪可進入別教一乘者即知彼三乘等法本來不異別教一乘何以故為彼目故更無異事故如法華經同教説者是此是賢首義又如至相橫依方便中第一義曰一由依究竟一乘教成何以故從一乘所流故又為一乘所目故此是四祖義故演義曰彼權實是方便門説於真實是真實不謂方便為真實則方便門開知實理之普周則真實相顯故法華云開方便門示真實相今能開顯故不滯枝派約佛弛張故須分權實也已上四五六三大祖師明法華經旨會機攝末法義差別是故四祖述章立意先標華嚴別教一乘為本次指法華界外索車為末本末相符善巧攝生決顯一乘也故標題曰融會決顯一乘妙趣也有三知識迷佛化源昧祖本末豫師以華嚴圓別一乘唯別權三失復師雙別權實三乘失會師曰卓絶獨立失失在自相名別也三師昧祖元開本末二教之意各説別三之差固茲矯亂互興鬪諍澆漓道學並列卷後具評次同教本末章曰同教者經云會三歸一故知同也解曰華嚴四祖雲華尊者以東流一代聖教從微至著曲盡幽玄統為五教於圓教中具本具末開別開同五祖賢首嗣法遵承特述教章首明同別別如前解同如今釋言同教者以同字一言立教總名通目一代諸眷屬經皆名同教也於中雖有偏圓頓實始權愚小等教之殊而各教下所詮教義理事境智行位十法義門皆從華嚴圓別根本法輪所流所目故派本垂末故即末同本故故名圓教也者之一字牒教名也經云者指法華經是一代化儀最後開顯以方便一乘為能會之本以一代權漸三乘為所會之末會末歸本本末相符攝生善巧即本同末攝末名同故清涼曰法華方便一乘為開漸之本為攝末之本露地等授大車故曰會三歸一故知同也須知此同唯會一代漸三之機名方便同也正當本章下文釋同次義曰又會義不同多種法門隨別取一義餘無別相故言同耳是知祖立五教并開同別皆用單字立教總名總含教下差別法義各歸一字所目也故賢首曰同教者於中二初分諸乘後融本末初中有六重七義者從一資多遞互映帶窮本究末義備諸乘故有同教一乘同教三乘同教小乘諸乘雖多乘宗止三或加佛乘則曰四乘更有開合則一至無量乘也若約以教攝乘教則差別盡彰緣起之奧以成同教之旨皆是如來善巧方便隨機高下施設諸教教義多種並以同字一言為總通目諸乘諸教各詮法義差別不等是故吾祖各據乘教趣證差別隨別取義緝成多字義句名同者凡二十餘同皆是隨別取義義句名同也若取義句差別之同立同總名者矯亂多矣若約全收諸教名同者是顯本法德用無窮攝前諸教人法無礙一一同圓亦名即圓通同亦名不思議同亦名圓中同同同無盡皆不思議也復師立此為總同者錯如卷末評若約理體遍通名同者則名會融無二同此同名義唯就理體融本末機皆同一體不説德用圓融唯顯理體緝成義句名同也故曰緣起理實同一法界本末鎔融一體無二也豫師立此為總同者錯如卷後評也若約逐機得法分齊阿含施設則名方便同此同名義從圓所流故與圓為方便攝生故人法未圓亦名不融同此同有多種義句之同各各差別若約同頓同實名同者以終頓二義於一佛乘詮法末圓一相孤門教下所詮存絶各異頓漸自殊故祖曰絶想一乘如楞伽此頓教佛性平等一乘此終教也雖皆詮一乘而未圓融名不融同故祖列曰同頓同實顯非合二教也會師妄執祖曰總取雙絶雙存為合二教作圓中同者此師不曉總取之意獨合終頓為圓同失又昧融不融分同祖約不融開出義當方便同收不應約全收圓中同義説如此等失具卷後評若約泯二同者亦以終頓二教名同此約乘體是一同泯二乘故合二乘為同教一乘也故清涼曰終頓二教泯二是同故合為一教下列四中云三同教一乘即合終頓二教是知泯二名同的顯乘體名同也復師釋曰得名因由又非合二名同會師釋曰出合所以二師之失具評卷後若約三一和合名同者此約法華破昔權三各別法行會歸一實和合法行此約法行和合義句名同也賢首曰先以三乘令得出後乃方便得一乘者此即一乘三乘和合説故屬同教攝清涼曰會昔成今義説四乘故借喻顯曰謂以三點喻於三乘以成一伊喻為一乘別説三乘三皆是權合三為一故得稱實以此證知是約法行和合名同也復會二師皆約教義和合釋者錯如卷後具評若云回三人一名同者賢首曰亦名回三人一教此如法華經説從古諸師皆以亦之一字只是重名便是三一和合更無別説今謂不然且前三一和合正是會三為一義説四乘以顯法行和合也今名回三人一者顯機增勝示真實相露地授車故云人一正當演義曰彰今異昔義中揀云前但合三為一一無別法已成四乘今辨一乘別有法門乃至曰唯為一大事出現於世不為餘乘等也既曰回三入一則知捨三唯顯一也於理昭著正是法華示真實相唯證一乘無三可合也是知兩種名義自殊不可為一豫師等並從古説錯如卷後評其會三歸一同如上具明唯會一代權實三乘不會其頓故四祖曰離言根境非安立門故頓不屬會又曰頓屬上分本教義漸從其末義等清涼亦曰然法華為於一類開顯本末若將定判一代聖教收義不盡也是知會三歸一唯會漸三一義名同也會師取此為總同曰雖立言小異多義如彼者錯如卷後評已上略敘數同並約法義差別緝成義句多字名同義非一準是故四祖特立同字一言為同教總名通目諸同也祖曰一言通目者如以信一言通目諸位也是知以一字為一言也文選注詩題曰古人始作四言詩五言詩其七言詩者後人加作也及至論語曰詩三百一言以蔽之曰思無邪何晏注曰古者謂一句為一言詩雖三百篇之多可舉一句當盡其理也今謂思無邪雖三字為句而歸正字一言也故演義曰一言蔽諸者即論語子曰詩三百一言以蔽諸曰思無邪謂歸於正也念一佛號亦名一言直取一言只一佛字故自四祖禪要唯稱佛言耳又如世金字一言通目五金穀字一言通目五穀果字一言通目百果草字一言通目百草其於品物形色種性從義立名雖各各差別而各各類歸一言所目也譬今諸教偏圓頓漸權始愚小各各教下詮顯一乘三乘乘法稟修雖各差別而皆華嚴根本一乘圓教法輪所流所目融會歸同故立同字一言為總通目諸教差別法義隨別取一謂一一法義義名同而無別相也義近世有三知識不詳祖述有昧同字一言為總各伸知見各取諸教義句之同各立總同者矯亂多矣具如卷後別伸評辨已上釋同教本末竟兼前別教本末兩科收歸第二列同別各開本末竟今當第三釋同字一言為總文復分四且初通目多義全收名同章曰又言同者衆多別義一言通目故言同解曰通目諸教眷屬經中教義理事因果行位等十法門義乃至末代流通舍利見聞等衆多差別法義並依海印定中同時演説十十無盡主伴具足卷舒自在皆不思議以為教本故故賢首曰同時顯現同時前後理不相違當準思之故今科曰通目多義全收名同者全收諸教為不思議圓通同也二會差別義方便名同章曰又會義不同多種法門隨別取一義餘無別相故言同耳解曰會彼同時異處異時異處逐機深淺説諸經教各各所詮多種法門隨別取之一一法義並同本教所流所目與本圓別作方便引攝故以同通目故無餘別相故故四祖曰華嚴是主餘經是眷屬以此準之諸部教相法義差別不等隨別取一不離本故故以同目故賢首亦曰是同教故末不離本故依本而説故言同耳故祖依經立一同字為教總名具含總別總約本法融通通目多義一一同圓故有全收諸教名圓中同也別約逐機分齊差別會義不同多種法門隨別取之故有全揀諸教名方便同也若人法俱融別總別無二也故華嚴曰善財見大願精進力夜神發十種同己心夜神與説八十四同行清涼疏曰通論同有四義一人法無二與一切法界同二因果無二與一切諸佛同三自他無二與一切菩薩同四染淨無二與一切衆生同故鈔釋曰謂由證見法界體同故上同諸佛下同衆生等故祖依經立同為總目也三通目諸乘宗類名同章曰所言同者三乘同一乘故又言同者小乘同一乘故又言同者小乘同三乘故解曰前明諸教所詮差別法義同竟今顯乘同然諸經論乘數至多開合不等有約趣果止分為二謂大小二乘也有約從理成行則分為三謂大乘中乘小乘也有依法華三乘一乘約界分體相方便究竟不同故又約數説謂二及三各通三二義意故説也今此乃約成機欲性顯法本未乘宗類攝也故四祖曰依攝論一乘三乘小乘謂於教門中成機欲性顯法本末差別不同也是故以三小之末同一之本者以道品名同引失三小生信樂故故四祖問曰一乘道品既名數別體亦須別因何有義與三乘同答據義分量深淺寬挾並皆不同今舉義門有差別名字有同欲引三乘信樂故也小乘道品名數略有三十七種三乘道品名數亦同但義有異廣在經論此顯道品名同引末同本説也若約法相交參一乘垂於三乘三乘參於一乘兩宗交接連綴引攝令易信入者委在下文云即以一乘別教從三乘説中具釋又如五祖教章同教門中初分諸乘有六重第一重內七義委明賢首於後結曰依上諸義即三乘等並名一乘皆隨本宗定故主伴不具故是同非別也四敘古之通通即名同章曰前德已述通別二教而未見釋相今以理求通之與同義無別趣也解曰雲華尊者述古之通通義即同故以同字一言立同總名顯非自意遵古所立也已上四科收歸第三釋同字一言為總竟今當第四彰問答答異歸同文復分四且初彰異違同問章曰問所以佛教多用一言通目諸義既通目諸義於辨才中云何得明法義及辭樂説等耶解曰本問來意既曰一言通目諸義諸義應同如何於辨才中却有法義辭説四種異耶耶之一字助顯問意也二遣言通性答章曰答佛教若不通目有情衆生隨言取義以定根性無由以近會其遠旨解曰佛説言教隨機勝劣雖則法義辭説四種有異大意通明顯歸一性性若不通法義壅隔是故有情迷性衆生隨取近言生死無常苦空法義執取而修報趣人天權漸根性隨言修證證小果者無由遠悟一性真常本無生滅法性本空寂無取亦無捨證性圓通一乘佛果也是故華嚴四無礙智通該一切同一理性經列十門初依自相謂知事法體各殊故二依同相謂知理法若性若相同歸一理故廣列經文疏隨解釋繁不具引若約乘攝四無礙者演義曰大小乘相中法知一乘義知諸乘詞云説一切乘無差別即同一乘樂説云説一一乘無邊法即同説諸乘意也是知法義攝乘四皆無礙通歸一性了無四異也三結通明大道章曰所以佛教存通目者依其論道及施設道以生智滅惑顯理成果之便巧也解曰法本通玄義無壅塞不為惑業所拘豈昧性真玄通故存通號統目為德云惟一實之題者貴使群生去執我人山發明元性海依性核論顯揚其道及乎施設教道位地高下即非隔礙以用發生根本大智通滅無始迷執妄惑惑忘理顯成就佛果此是大聖善巧方便也故下經云佛説一切法本破一切執若無一切執則無一切法也四引經證一言文復分二初顯信一言通目諸位章曰故華嚴中信解行等諸位以信一言成其信位位中所含即通成解行理事等一切法門亦簡前後諸位法相不同解曰信為元首道之長也通括始終該攝三賢十聖一切法門以信為宗故清涼釋曰今在信門收無不盡下諸位中皆具一切也故下經云信為道源功德母長養一切諸善法等言亦簡前後諸位法相不同者簡顯此經圓別一乘行位法相不妨前後相入行布圓融自在無礙不同三乘信解行位阿含門中階降次第前後相由也故清涼揀曰非是前後鉤鎖相因唯是本位信中有此則有彼同時具有而説有前後不同三乘前後相因也二會同普眼結顯玄玄章曰及會普眼境界一乘無礙陀羅尼門據斯聖巧一言之下玄復玄耳解曰法普即眼普義通乃見通能於一言解一切法能於一境見無盡境界故清涼曰名普眼者詮普法故普詮諸法故乃至曰諸緣發見緣名為根因沒果中緣皆號眼等一乘無礙陀羅尼門者陀羅尼翻為總持總持一乘法體具塵沙德用從本已來持之不失也門者出生義也至相曰十陀羅尼是一乘文義如離世間品印相施設工巧字相等並準此知據斯聖巧一言文下玄復玄耳者結顯一言通玄無盡如清涼曰一字法門海墨書而不盡即善財所遇第三知識海雲比丘於如來所聞此普眼法門於能詮一字中便證所詮無盡法清涼曰即海雲所持以大海量墨須彌聚筆書此普眼法門一品中一門一門中一法一法中一義一義中一句不得少分何況能盡但是深入法界菩薩陀羅尼力之所能持也圭峯釋曰少分者即一字也是知圓別詮旨玄妙顯一言具無盡詮明一法具無盡旨也故圭峯曰以能詮一字全即所詮法界故即無盡不同諸宗能詮定非所詮也已上二科收歸第四引經證一言兼前三科總歸第四躡蹤問答辨異歸同竟今當第五明一經八會法門文復有六初地前五會從三比行章曰又華嚴經文前之五會及十明已後盡不思議品即以一乘別教從三乘説解曰今顯晉經八會卷攝圓通料揀八會不出初會故至相曰初會十門料揀一部經意初會如是我聞首料揀下文所目之義約有十門謂人及法理事文義解行因果相成主伴以明旨趣也故清涼亦曰以文從義科者此經一部有五周因果即為五分初會中一周因果謂先顯舍那果德後遮那一品明彼本因名所信因果二從第二會至第七會中隨好品名差別因果謂二十六品辨因後三品明果亦名生解因果三普賢行品辨因出現品明果名平等因果非差別顯故亦名出現因果四第八會初明五位因後明八相果名出世因果亦名成行因果五第九會中初明佛果大用後顯菩薩起用修因名證入因果因果二門俱證入故是知晉經八會卷攝相盡不離初會總顯人法理事乃至因果十門法義相成主伴以明旨趣也初會為總信解行向四會為前五會也經文善巧以一乘別教一周因果圓通法本垂於三乘從彼教相約顯地前比行而説也清涼疏約前後攝疊十科中第七科曰就前復二初明地前比行後第六一會明十地證行也言及十明已後盡不思議品者十明即第二會中問明品也是顯十信之明貫下諸位直至晉經第六會已後盡不思議品至隨好品並明差別因果也故清涼疏約前後鈎鎖科中曰四從問明至隨好品差別因果前因後果皆依一乘別教甚深法界無盡因果善巧所流從三比行説也二登地一會從三證行章曰十地中文即用一乘圓教從三乘教以顯一乘別教説解曰功不虗設終必有歸前明解導行願賢位因終今顯智冥真如聖位果立也言十地者十是一周圓數十十無盡也地是生成住持持諸功德也故本業云地名為持持百萬阿僧祇功德亦名生成一切因果故名地也若爾云何説得諸位階降次第答以此經中安立諸位有二善巧一約相就門分位前後寄同三乘引彼方便是同教也二約體就法前後相入圓融自在異彼三乘是別教也但以不移門而恆相即不壞即而恆前後是故二義融通不相違也今即用此融通甚深言所不至從彼三乘之位地前行布地上圓融説者要以一乘地前地上俱具行布圓融以顯一乘深廣寄彼三乘令易入故故清涼曰三乘之位地前行布地上圓融今一乘位地前地上俱有行布圓融若俱雙辨則前後不異若地前行布地上圓融則全同三乘前淺後深又似行布圓融各別教行不知法性教行非即非離故於地前但顯圓融已過三乘地上多明行布以顯超勝勝相云何謂賢位始終已圓融自在登地已去則甚深甚深言所不至若不寄位何以顯深不包三乘何以顯廣是知以圓一乘從三乘説者方顯一乘別圓法體圓融自在也故賢首曰若自別教即不依位成今寄三乘終教位説以彼教中信滿不退方得入位今即寄彼得入位處一時但得此一切前後諸位行相等是明法體深玄難解故寄三顯令易入故若約乘寄地如清涼曰九約寄乘謂初二三地寄世間人天乘四五六七寄出世三乘八地已上出出世間是一乘法故以諸乘為此地法委釋具三十五鈔廣如彼疏及賢首教章行位差別具明三結顯地法成就功德章曰所以知者故文中以悉曇字音會成無盡故也解曰梵語悉曇此云成就言字音會成者即字母為衆藝之勝書説文本故此偏明之故經列四十二字一曰阿字是無生義達諸法空斷一切障二曰多字是清淨無染離塵垢義乃至第四十二日陀字即究竟處所謂此究竟含藏一切法輪也故經結云善男子我唱如是字母時此四十二般若波羅蜜門為首入無量無數般若波羅蜜門也清涼疏結云四十二門者謂表四十二位故故智論中諸位圓融明初阿字具後諸字故曰字音會成無盡故也然新譯本第四十二曰茶字去聲引之故智者觀經疏曰究竟佛者道窮妙覺位極於茶又南嶽用對圓頓教中四十二位初住阿字中四十一字對至等覺最後茶字當於妙覺雖一一位皆能遍具諸位功德然是分具今此極位乃究竟具諸位功德也若更委辨諸經譯別字多乖舛如涅槃以阿字為噁此中以囉字為多此等不以義定故多訛謬委如演義五十九釋四別教一乘因果交徹章曰普賢性起用彼一乘別教以顯一乘文義由彼文中是廣大説故解曰普賢性起二品明普賢行因成現果分以晉經缺第七會初十定品也自十通品至如來性起品凡有十品兼前十地品共十一品並第六會收其中十通品至菩薩住處品計有五品辨等覺法門等覺義周終明妙覺故次佛不思議等三品明妙覺之果略有二義一不可説二可寄言寄言中復有二義一差別説二平等説差別説者即以三品酬前諸因因果別故初總明佛德逈超言念名不思議品次辨身相普周名如來十身相海大相既爾隨好更多名隨好品已上皆屬差別因果也今顯普賢性起二品明平等因果謂因無異果之因果無異因之果因果交徹平等不二不二而二因果歷然因即普賢行門果即性起圓融也唐經名如來出現品今依晉經名如來性起品是第六會了是顯別教一乘平等因果以彼二品經文廣大説故也五七八二會一乘證入章曰離世間下二會之文一乘行法以始標終説故教義俱一乘也解曰由上差別平等因果生解既終今攝解成行六位頓修辨二千行門一時齊起而處世無染故受之以離世間品次入法界品近望上文大行既具則證法界遠取諸會信解行願本在於證依人證入故次辨之如來自入師子頻申三昧即果法界令諸大衆頓證法界善財歷位漸證法界漸頓該羅本末融會皆證法界故受之以入法界品此上二品晉經為七八二會唐經為八九二會始標則前之六會是寄三顯一也終説則七八二會正顯一乘行法圓滿無盡教海唯證相應無盡法門自此略畢又復教則因大義則果大教證二大詮旨圓融俱一乘也六問答辨明六決定體文復分三初約數不圓問章曰又十地以前四會中六決定文何故不依十數而説解曰文中問意以華嚴所説法義一一須十以顯無盡何故地體唯六決定又於地前四會經中或五或三六數不定耶二寄顯深義答章曰答為六決定是本分義深體略難解故寄三乘之教却顯一乘玄趣令其聞者一往易解也解曰此六決定是十地體通十地故亦通十住已來故經云十住中有五決定十行亦同除大善十回向有三決定謂觀相及大善不怯弱故至相六決定章結曰此之廢興顯位高下增微故通義可知此義通彼修生及本有非彼三乘及小乘所知普賢性起在此位中何以故同是證故至相又曰如地經説六決定義是其地體返不由十數目之十地不同是其地相翻用十數目之以此驗求知佛慈悲欲令易解將不滿教目體以滿數教目相是佛別意也三明經宗善巧章曰經文善巧交絡二義顯宗分齊極善妙也解曰通顯一經八會法門寄三顯一前後交絡善巧攝機以明圓別一乘玄妙宗極分齊也交絡二義者一乘三乘乘義交絡也地體地相二義交絡也又清涼曰三宗趣者先總後別總有二義一以地智斷證寄位修行為宗以顯圓融無礙行相為趣二前二皆宗為成佛果為趣此明宗趣二義交絡也後別者別於上總略有十義乃至第十曰十者撮要謂六決定宗辨此故又曰論其體性多不出前為成十故小有加減一即離言體二所證體乃至第十唯因體取其別相異果海故收此十體不出三體一總含體二剋實體謂智興證三離言體配屬可知上二即因下一為果因果非即離言慮雙絶以為地體也已上三科收歸第六問答辨明六決定體兼前五科總收歸第五明一經八會法門竟次當第六明三一緣起不同文復分三初三乘分淨緣起章曰三乘緣起緣聚即有緣散則離解曰緣起有二一染二淨染者謂六道衆生迷真執妄內起妄心外執妄境心境二緣交妄起染故起信論云無明熏真如成諸染法等淨者謂小始權漸之機知染成過從真起淨即是三乘一聲聞乘修五停心觀七方便等二緣覺乘覺乘無性成辟支佛等以此二乘唯除我執未除法執等故云分淨三菩薩乘聞五性三乘之教信唯識理不執我法雖發三心四願乃是厭權有為欣求菩提猶墮取捨雖修六度萬行雖斷二障雖證二空乃是二空所顯真如而非二空即真如故義當權始分淨也若終頓二教雖則知真實性無別八識猶拘翻泯亦先離過後方成德是故淨緣起時權聚為有淨緣散時幻滅為離有聚散離皆非稱性緣起之際本來究竟離於造修者故曰分淨也此上展轉淺染分淨顯前四教皆當分淨皆屬三乘以為所對委如行願義記具明也縱然終頓圓三合為一實而終頓實權未足故不辨圓融具德也故賢首曰雖頓終始三權實之異總為一三乘教以皆為三人所得故等乃至於十玄緣起門後揀曰是故大聖善巧於彼三乘位中隨其機欲方便少説由不窮法界源故權現二身三身等佛未顯諸佛十身自境界故故云淨分緣起也二一乘圓淨緣起章曰一乘緣起緣聚不有緣散未離解曰一乘法體全性緣起性周法界緣起無邊聚成妙有有德非常故曰不有散成真空空非斷滅故曰未離譬如明鏡照聚有不留照散本非離至相曰明一乘法界緣起之際本末究竟離於修造何以故離相故起在大解大行離分別菩提心中名為起也由是緣起性故説為起起即不起不起者是性起也賢首曰由是緣起是法界家實德故普賢境界具德自在無障礙故華嚴云菩薩善觀緣起法於一法中解衆多法衆多法中解了一法是故當知一中十十中一相容無礙仍不相是餘門亦然是故圓淨緣起諸門法義法法緣起一一無盡包空有而絶相入言像而無迹廣如六七二祖行願鈔具明茲不繁録也三結明綺互彰圓章曰此約所對不同故成綺互明耳解曰前顯分淨為對不同圓淨緣起法門重疊若雲起於長空萬行芬披比華開於錦上故賢首揀曰與彼三乘全別不同宜可廣依華嚴經普眼境界準思之已上三科收歸第六三一緣起不同竟次當第七明同體因果依持文復分二初依體平等章曰又如同體依持以明因果理性體融在因為因在果為果其性平等據緣以説解曰法界一理體平等如虗空為聖為凡作依止體為聖為凡作任持用用及緣修趣證無為雖則機差因果殊異而一理性平等融和故就緣起門中同體異體二門無盡也故賢首曰初門同體即攝同異二門中無盡無盡列十無盡窮其圓極法界無不攝耳故曰在因為因在果為果其性平等據緣以説也二據緣差別章曰在一乘則圓明具德處三乘則一相孤門在小乘廢深論淺居凡有則唯事空文此即理之妙趣也解曰至相十玄章曰在一乘即圓明具德謂此一乘因該果海果徹因源圓淨緣起具德無窮賢首曰經云初發心時便成正覺具足慧身不由他悟如是云云無量廣如經文乃至問曰此等歎因中德耳豈可即滿德果耶答此一義因果同體成一緣起得此即得彼由彼此相即故若不得果者因即不成因何以故不得果等非因也乃至又曰由此因體依果成故但因滿者即沒於果海中也為是證境界故不可説也次曰處三乘則一相孤門者賢首釋曰三乘但隨機而已未顯諸佛十身自境界故非現佛身又隨機少説一相一寂一味理等非窮盡説也何以故三乘以此無窮為過失故等次曰在小乘廢深論淺者由此小乘於甚深緣起一心法中依淺智事識觀緣起行於深智業識但得其名未達其義如小乘論説但有六識義分心意識又如增一經説於阿賴耶識但得其名是故至相緣起章曰若據勝劣緣起是勝觀亦即是一乘小乘之中雖有名字而不達其義何以故不斷法我故次曰居凡有則唯事空文者謂六凡類迷情昧智緣起事行十善五戒縱得功成報超欲色尚拘事禪不通理觀故曰唯事空文也故至相緣起章曰緣起者大聖攝生欲令契理捨事凡夫見事即迷於理聖人得理即於事也已上四句據緣説異從聖至凡深淺雖殊其實顯理事理融即成大緣起故就結曰此即理之妙趣也故至相又曰今舉實理以會迷情令諸有情知事即無即事會理故興此教也已上二科收歸第七明同體因果依持兼前共七科總歸初序説由致分今當第二正説同別分文有十初同別法智利機無盡文復分二初一乘別法因果無盡章曰又一乘之法對機以明別非謂自相而可別隨機論別相別別具十所以説十者欲顯無量故解曰一乘別法明教義因果理事德用等十法義門一一逈別為法界大緣起際攝法無餘也若約果證究竟不論對機以果海離言故不可説其相狀之別故曰非謂自相而可別也今明普賢境界以普因普法普利普機機法俱普別別具十十十無盡以顯無量也故賢首曰法界緣起乃至在無窮今以要門略攝為二一者明究竟果證義即十佛自境界也二者隨緣約因辨教義即普賢境界也初義者圓融自在一即一切一切即一不可説其相狀耳乃至曰不論因陀羅及微細等故地論云因分可説果分不可説者即其事也是故今文約因對機以顯一乘別法聖凡等有具足一體本無限量故曰欲顯無量故以主伴圓融一一無量也會師解曰卓絶獨立名別者失在自相公違祖釋具評卷後二一乘同法智會無盡章曰又一乘同法對智以彰同若引機以會同則同同具十即窮無盡也解曰一乘圓融同法緣起德用有其二門初異體門二同體門且初異體門有二初約空有相即自他二義望體説同初由一乘自有體時他無量乘必是無故故自即他何以故由自無用他作故故祖曰以二有二空各不俱故無彼不相即有無無有無二故是故一乘同法同無量乘常相即故故祖曰若不爾者緣起不成有自性過等也次二力無力自他二義望用説同由一乘自有全力故所以能攝他無量乘他諸多乘全無力故所以能入自也其他有力自無力義反上可知故賢首曰以用攝體更無別體故唯是相入以體攝用無別用故唯是相即乃至問曰上一多義門為一時俱同耶為前後不同耶答即同即前後何以故由此法性緣起具足逆順同體不違德用自在無障礙也是故第二同體門一中多多中一一即多多即一與前異體二門窮極圓同無不攝盡故賢首曰同體即攝同異二門中無盡無盡窮其圓極法界無不攝盡耳祖又問曰此與前異體何別答前異體者初一望後九異門相入今此同體一中自具十非望前後異門説也即義亦準思之是知以無障礙智即如理智如量智乃至三智四智皆無障礙以成重重無盡也謂智無礙故一智則一切智境無礙故一境即一切境境智各有一多無礙相對論之故賢首曰若廢智即不論緣起由約智故説舊來如此何以故不成即已成即離始終故智興法舊來成故問為由智耶法如是耶答為由智也為法如此也何以故同時具足故故曰對根以彰同也以無障礙法界境對無障礙智彰顯大緣起不思議圓通同也若約引機體德圓別會同無盡者故曰同同具十無盡也是故一乘同法普攝聖凡智回向故會融無二同一法界故賢首遵承特述教章曰二同教者初分諸乘後融本末中曰此同教説諸乘會融無二同一法界乃至曰一乘即三雖具隱顯竟恆無盡明知立同總名是顯華嚴一乘直明法界理遍通故全體無二不同法華橫依方便破異顯一也會師立法華會三歸一同為總收諸同者錯具卷後評矣已上二科收歸第一明同別法智利機無盡竟第二明同別證道核論相殊文復分四初小乘必真論道有諍章曰又小乘未窮論道故有諍論解曰前華嚴究竟一乘同別法本是諸佛衆生平等具有然以機差教別道有大者焉小者焉實理方便成信末能窮究一真大道競自分宗論也故至相曰若小乘中但有為小乘宗不得法空故不盡法源故教不滿故故多諍論二三乘及章曰三乘及同教窮其論道故有定論解曰以頓詮真實唯得真如門中能所俱泯論道決定泯離言詮故賢首曰頓教中三始終俱離也其次終教亦詮真實唯得真如門中能所俱存論道決定由窮法理不假言論故賢首曰終教中三始終俱同同歸佛乘也其次始教初入大乘未盡法理論道決定則須言論是名權三故賢首曰始教中三始終俱別以有入寂故已上三教論道唯除頓教泯故不説其終始二教論道故至相曰若至初教則須言論為正初教中不盡法理以言尅申故又曰若初教中則有論興不論俱名為論何以故二義取要顯佛法故若至終教不論為正由窮法理不假言申故又曰若至終教則以不論為論何以故息相歸真成證顯義餘不順理故以不論名論也具明大小乘唯論道方便則其分齊如對法論之後論道決擇處説亦如攝論定學後分中説統上小三並為同教小乘同教三乘故曰及同教窮其論道故有定論也三一乘大道圓極絶論章曰別教一乘絶其論道故無論義經法門具滿無喻可況故無譬喻經法門圓備不可由致而説故無因緣經解曰華嚴別教大道一乘具足十二分教一一玄通法法顯道何故今文絶其論道故無論義等三分耶答至相曰若約乘論有二義一通相説一乘三乘小乘皆有十二部二若分別説者一乘有一部謂方廣部有九部謂無因緣譬喻及論義如金剛身品説故清涼曰而涅槃説大但有九部者依三部中之小相故謂因緣中取因事制戒於譬喻中依為誘引於論義中約非了義今文從分別義説故初以一乘了義絶其小始論義非了義故故無論義分也二以一乘別法圓滿具足無可喻況絶其分教中誘引淺機就彼取類令生信故故無譬喻分也三以一乘法本本來圓備不可以因由所致絶其因事制戒故無因緣分也若約通相説者具如清涼釋十藏品疏曰此經之中具足十二一因請方説為重法故如三家五請等二因事方説知本來如觀善財等又曰一為深智説相似法令解真故如法華云諸有智者以譬喻得解如出現品一一喻明等又曰一以義深故二義不了故並須循環妍核或佛自説或菩薩相論如問明品等故疏後結曰此經之中具足十二已如上引十二分教義已略周然此十二分教舊名十二部經恐濫部帙改名分教也四結顯教網曲巧被機章曰此則佛法善施教網極巧然矣解曰文意俱易但依科文已上四科收歸第二明同別論道妍核相殊竟第三明同別通觀滅惑證理文三初同教通觀據佛性説章曰又佛性論明其通觀通觀滅諸惑通證諸理通成諸行通尅諸果此約一乘同教言解曰通觀者通一乘三乘等教以一無分別智定為能觀也故清涼曰觀無相法了知平等離念契玄即無分別也通觀諸教之下乘機觀智伏惑滅惑之異通觀諸教所詮生空所顯理二空所顯理無性真如理等也通觀諸位別行通行八萬四千事理逆順等行也通觀諸乘觀成之相望前尋思即為觀益望後尅證即為得果諸教諸乘淺深不同故曰諸果此上諸義並如佛性論明然此通觀離言説相不可説其體相言義不同但是一行三昧據其所尅亦得頓旨若據方便通三通一若以智回向知是一乘方便亦入一乘約一乘同教言也故至相通觀章曰通伏諸惑通滅惑種通修諸行通觀諸理故名通觀則是一無分別智定也此觀據成離言説相不可説其體相言義不同但是一行三昧據其所尅亦得則與頓教義若據方便則順尋思及以如實唯識意言等此順三乘若為一乘所目則屬一乘若回向一乘知是一乘方便亦入一乘此義則約同教一乘也二別教通觀依華嚴説章曰若一乘別教説即通通具十窮其法界也餘並準之解曰別教一乘通觀者依華嚴經初觀菩薩依十種法謂身口意三業佛法僧戒依此十法乃通三乘一乘修也體略有三初戒次四無量三慧也此三體中各具二義初戒二義者一隨相義二離相義次四無量二義者一有緣義二緣無緣義三慧二義者一有分別義二無分別義清涼釋曰上三中二義各初義通凡小後義唯大乘此二不二為實教梵行若一行具一切佛法方是華嚴之梵行也令謂凡小唯大是通三乘也此二不二是通同教若一行具一切佛法等正顯十通無盡窮其法界是則教一乘通觀也又至相問曰空觀云何答依華嚴經初觀菩薩依十種法乃至末後結曰並成觀境但深淺異也若窮空方便一乘究竟三引論攝通觸事成真章曰又梁攝論云生死即涅槃無二無此彼故者欲明即事備真矣解曰生死是妄染事涅槃是真淨理若證通觀者決無事理二境之礙決無染淨真妄此彼之拘是故經云一切無礙人一道出生死故曰即事備真矣已上三科收歸第三明同別通觀滅惑證理竟第四明同別行位融不融殊文三初同教三乘行位差別文復有二初信解次第章曰又諸三乘經論所明位地及差別次第法相門等並約信解門中作如是説故大論云隨一方化儀也解曰三乘位地阿含施設化儀前後信解為發趣之端行向乃運修之始聖地佛果為證性之終行布淺深法規次第儀軌當然故大智論揀非一乘行位行布圓融互遍法界以彼三乘行位隨機成局一方施設也故賢首曰以三乘行位是約信解阿含門中作如是説也二月章曰若據行法則不如是行解亦入解門解曰有解無行其解必虗有行無解其行必孤行解相資行入正解也故帝心曰若不洞明前解無以躡成此行清涼曰及顯相資目足更資也若不解此行法絶於前解無以成其正解清涼釋曰絶解成解圭峯曰絶解為解是知前顯儀軌正分行布解行今明行法圓融行解相順也已上二科收歸於同教三乘行位差別二別教一乘行位等齊章曰又別教一乘佛及普賢願行等法始終皆齊無有前後仍於諸法義隨舉為首餘即為伴宜可思之解曰佛及普賢即因門果門攝法無盡始則約相就門安立信住行向地等分布前後寄同三乘引彼方便是同教也終則約體就法信等地位即無前後始終皆齊相入圓融隨舉一位即一切位具足主伴是別教也故賢首曰以此經中安立諸位有二善巧一約相就門分位前後寄同三乘引彼方便是同教也二約體就法前後相入圓融自在異彼三乘是別教也但以不移門而恆相即不壞相即而恆前後是故二義融通不相違也三就方便同開總別知章曰若隨機欲或有總知謂大學者或有別知謂小乘學者解曰就前同教三乘中隨機欲性開出大乘學人為總知小乘學人為別知良以大乘學人具廣大心故總知三賢十聖佛果位地漸次法門全斷煩惱所知惑障開顯理性總知染淨等法故名大學也其小乘學人闕廣大心故故名別知別知暖頂忍世第一小乘十地十二位行位等相不廣顯故洎至斷惑愚法小乘中十使不通迷四諦故名別知也故賢首曰今此就實中愚法二乘無廣大心故不究竟斷煩惱障又亦可前約三乘中聲聞此中約愚法故不同也已上三科收歸第四明同別行位融不融殊竟第五明同別依定二智起殊文二初一乘同別依海印定起章曰一乘同別教義依海印定起普眼所知解曰海印定體即根本智也體遍十方故普悉包容無所拒故明三昧心周于法界以喻顯體故稱海印故下經云海有希奇殊特法能為一切平等印衆生寶物及川流普悉包容無所拒是故如來初成正覺首證此定教起前後卷舒自在同時演説十十法門該於九世十世無盡佛法並於第二七日一時現起唯證普眼則偏知也清涼釋曰觀境自在無境不觀故曰普眼乃至曰以虗心之覺契唯如之境則不動法界窮乎寂照之原豈非普哉諸佛窮究此經具顯此明別教依起也若逐機末教有與一乘同時異處説是同教末不離本故依本而成故故賢首曰地論云時處按量顯示勝故同時者顯是同教故異處者示非別教故也更有菩薩相似海印定如大集經説矣二三乘教義依後得智説文二初依外薰意識説章曰三乘教義依佛後得法住智説聞思修及報生善意識解曰後得智從佛根本智流出此智流出大悲心如來欲安立正法住世了俗證真故説十二分教顯示大衆生受所説也故清涼釋曰一受持謂求聲慧初聞即受隨聞受持如水不嚼隨得而飲二助力謂求思慧嚼所聞法助成智力如食咀嚼以資身力三遠離謂求修慧依聞思行能除惑習如服良藥藥行除病因承三慧外熏意識染成識種及至他世報生善得修道智境也故清涼曰謂變易所起異熟心識名為報生生能知無常等故名善得修道知也此則前六意識非實照之智也二依內證真知説章曰并內證梵行勝智及真實智所知此約別相説解曰由前三慧外熏意識後得智用觀通境法內熏心王根本智體故名內證唯識論疏釋十真如中曰得於三慧照大乘法觀此法教根本真如名勝真如或證此如説法勝故也梵行者梵云勃嚂摩此翻淨理染極故名梵淨行故清涼釋曰但以性淨故則行淨行淨故則智慧淨等名為勝智以梵行離染名淨淨唯顯空空極照真真實方現故下及字也故至相以華嚴梵行品為空觀觀通一乘及三乘教乃至曰若窮空方便一乘究竟也以空助顯真如實智智體所知也所知者義出涅槃住七善法得具梵行一知法二知義三知時四知足五知自六知衆七知尊卑具此七知是實智所知也廣釋文繁茲不具録已上顯內證根本智體異前外熏後得智用此就三乘約內外識智分別相説故文結云此約別相説也已上二科收歸三乘教義依後得智説兼前一乘同別依海印定起總歸第五明同別依定二智分殊竟第六明一三解行比證兩殊文二初一乘別機三生比較章曰又一乘法義出出世證餘時見聞及比解行解曰法是華嚴大威德法門就法顯義義分信解行證令機趣證義説三生故曰法義也直顯一乘機於具縛身中見聞此法成金剛種為見聞生依種發解依解成行即離結縛名解行生依行證入離於情繫名證入生此明圓機圓行圓證一生尅證三生必圓不落階漸疾得成證故屬別教一乘耳言出出世證者直詮因陀羅微細境界超出粗細衆生界故則不可説其分齊故也故至相曰法華經云此土常安穩當知三界內有粗細衆生粗者見劫壞細者常安穩佛所以不同説小乘三界唯一同成壞初教三界其義則空終教三界則加無分別一乘三界所謂無盡無分別等圓別之機乃約一念頓成説也曰餘時者如賢首曰若依圓教一切時分悉皆不定何以故謂諸劫相收故相即故該通一切因陀羅等諸世界故仍各隨處或一念或無量劫等不違時法也又如至相約餘時比較總有五説一依勝身一生即得二依三時益三依一時益四依一念益五無念益文義繁廣具釋如四十五知識章後具明也二三乘同機三生比較章曰三乘法義出世得證世間比而解行解曰三乘是聲聞緣覺菩薩三乘也詮顯諦緣度三法也就法顯義名依信解行等修習趣入得出五濁惡世證入清淨佛土不同圓別一乘所起行用皆遍法界也故賢首揀曰是故當知與彼三乘分齊全別何以故以三乘行位是約信解阿含門中作如是説也言世間比而解行者世間即三種世間中衆生世間自在行是菩薩隨衆生差別信等比較解行損益也故至相通依五乘定其解行損益章中曰又諸乘解行理事等所有損益並為世間未出世者成損益門非為出世者故梁攝論曰若世間法則可毀若出世間法則不可毀等已上二科收歸第六明一三行解比證兩殊竟第七明一三願行依住兩殊文二初一乘本法衆生依住章曰一乘法義佛及普賢菩薩願行建立有情衆生依而住持解曰一乘法體是為衆生依而住持但自迷倒住持不顯持非幻滅是故佛及普賢建立願行法門廣闢如塵數悉使衆生深悟喜故現相品云毗盧遮那佛願力周法界一切國土中恆轉無上輪二三乘行法佛等依持章曰三乘法義衆生業行建立佛菩薩等依而住持解曰三乘法義以衆生界為所依以大悲業行為能依若無所依能依業行無由建立是故理趣六度經云大乘萬行大悲為先譬如長者唯有一子父母憐念徹於骨髓菩薩大悲亦復如是於諸有情住於極愛一子之地也已上二科收歸第七明一三願行依住兩殊竟第八明一乘宗本想念頓成文二初想念幽玄章曰一乘法義臨其玄想玄想頓得若見於佛頓見頓見具十稱名亦爾菩薩亦然解曰一乘宗本乃同別之歸源萬行法門以三昧為元首臨者監也監照幽玄想滅惡覺想寂則氣虗神朗氣虗則智恬具照神朗則無幽不徹心境皆佛能所俱泯體則一行三昧用則內外無窮故清涼云內用有三慧眼偏觀一切境界是普眼用善巧方便是智光照耀用離一切障是清淨用乃至明其外用勝解印持隨心去住於中亦三不動而往不念而持不往而見等是知玄想頓得體用頓見法界無盡佛剎頓證法界無盡法門頓融理事相即無礙頓融性相相外無性性外無相性相交徹頓見真佛真土重重融攝直順頓見頓了是想非想乃名玄想是心是佛非心非佛是心是念非念是念故清涼曰見佛取相滯於方便知佛空寂真慧所沉念無念者不礙事而恆真無念念者不動真而恆用動寂無礙方念真佛方見真佛菩薩聖衆頓現無盡故曰亦然也然此第八一科正顯同別二教一三乘機進修宗本玄想三昧參學勝流當念念玄想取悟自心無厭繁説二成佛同時章曰一乘法義成佛共一切衆生同時同時具十成佛後後具十皆新新斷惑亦不住學地而成正覺也普賢菩薩行願亦爾三乘即不然解曰出現品曰我今成正覺普見一切衆生成正覺我今入涅槃普見一切衆生入涅槃何以故一乘法體凡聖本有性無二故同時具足無前無後新新非舊就用説斷惑則一斷一切斷約實體則無可斷以本清淨故不住漸次學地也至相曰今此一乘一念即得具足一切偏通諸位委如諸法相即自在門説是知圓別一乘法義成佛乃顯本真本成就事成佛也不同三乘説理成佛也故文揀曰三乘即不然也已上二科收歸一乘宗本想念頓成竟第九顯同別中各具同別義文二初別教中具同別章曰又別教之中亦有同別由多即一是其同也為一中多即是別也解曰別教中具同義者即同時具足相應門也以教義理事行位因果等十對事法為首皆各總攝一切成一乘無盡陀羅尼法無有前後參而不雜故曰由多即一也同時具足同時顯現故是其同義也別教中具別義者即一多相容不同門也以一教義具攝因果理事等十義門又隨一門中即具攝前因果理事一切法門如彼初錢中即攝無盡義者此亦如是故曰為一中多雖一具多而多非即各自差別故賢首結曰然此一中雖具有多仍一乘即是其多耳故知別教一乘法體具多別義也是故十玄緣起十門無礙初門多即一是同義次門一中多是別義以此同別二義為法界緣起一乘實德無障無礙也故本經云菩薩善觀緣起法於一法中解衆多法衆多法中解了一法等二同教中具同別章曰同教之中亦有同別一乘三乘同一善巧是其同也各為據機別即是別也解曰同教者同字一言立同總名此總同教自具同別二義也初有同義者約教攝乘故以同教一乘中同有諸教一乘故謂同頓教絶相一乘終教平等一乘始教密意一乘有八密義意一乘委如至相問答中顯也二者有別義者約法攝乘各為據機別名別也有絶相一乘機有佛性平等一乘機有密意一乘機有聲聞機有緣覺機有菩薩機諦緣度等三法三乘機別也此之一三教攝法攝同一善巧長養機緣無不周盡故曰同教之中亦有同別也已上二科收歸第九同別中各具同別竟第十顯真俗雖殊道合一體文二初貶凡情遍計過章曰有情衆生所知之境則無上來所明諸義何以故為是遍計故解曰凡情迷性不達遍知心境相違真俗成異則無上所明同別融通諸義故徵顯曰何以故為遍計執過故也二歎聖智通合德章曰前德云惟一實之淵曠嗟萬像之繁雜真俗異而體同凡聖分而道合者此則先人已通斯趣耳解曰文顯義通總歎先覺之人理通遺智亡言虗懷則道合一真也故前德什師又曰亡言者可與道合虗懷者可與理通冥心者可與真一遺智者可與聖同已上二科收歸第十真俗雖殊道合一體竟兼前十科總收歸第二正説同別分竟三流通指廣分章曰上來所舉略開一乘宗序之狀相也其間三乘法相次第明義取解法式列名出體釋得名所以辨寬狹明位地障治相擬通局隨義分別具緣多少問答釋疑等具如諸章及諸論也解曰文明意顯但指三乘法相具孔目諸章及粱論智論等諸大乘論一一廣明也上來釋章文竟次辨三師偽説別教如右第一豫師易簡記曰中間三教雖皆為三人所得終頓二教會泯歸一同得佛果即是一乘始教三乘修因各異獲果亦殊此唯三乘屬於權教今此對三乘乃唯始教權門也問華嚴異諸教何特揀權三乘耶答曰今此文意蓋為學大乘之外別有一乘權實混知故辨差別評曰揀會之殊錯引五六兩祖之文曲設問答抑斷華嚴首引中間三教等文此是五祖正立教中特顯華嚴別教一乘為本別前四教三乘為末也昧祖正意却乃擅加雖字縱之臆説終頓會泯歸一同得佛果即是一乘之説者又昧六祖會通四教之文不曉終頓同泯二乘為同教一乘此師不明本末失不明揀會失抑別類同失獨揀權三失從茲迷教眼已上總非説皆因四失矣第二復師折薪記曰此一乘者是華嚴逈別之別此門外三車通中間三教乃至曰證知三乘是法華前諸經豈不通中間三教耶評曰法華教旨唯會始權終實不會頓三何以臆説門外三車通中三教耶此違至相一乘三乘義章十對法就法華三對後結曰上件法門攝下諸教頓屬其上分本教義漸從其末義等本教是華嚴漸末是一代諸眷屬經也次昧清涼會通法華教旨唯會始權終實亦不言會頓也三違圭山釋未曾聞見覺性鈔中問顯圓覺頓經若在法華前説則是權教被法華破若後則法華已説此何未曾答曰序及懸談已明言此是別教一乘非法華通相一乘等是知頓經頓教自屬化法頓收不屬三時五時之數又至相曰頓非安立門故不屬會破復師違上諸祖説昧他法華旨為第一失又中間三教文屬賢首正立教中顯華嚴別教一乘為本揀中間始終頓三教三乘并愚小異末即與法華破會自殊此乃不明揀會矯亂同別為第二失析薪又曰下章三處明文以深密法相為終教何者如李唐三藏解深密等三法輪中後二是始終二教故文云此三法輪但攝小乘及三乘中始終二教不攝別教一乘等評曰第一引三法輪指歸唐藏宗計判攝者不曉賢首自依深密法性經中三種法輪攝機寬説故下章文明自指曰此三法輪中但攝小乘及三乘中始終二教不攝別教一乘也正如探玄曰以深密經攝機寬故就攝末歸本門收是約經部收機之寬就法判攝也即非指李唐三藏宗計局義判攝也故祖明曰空相二宗皆認法性之經成立自宗之義復師率情引文不詳祖述為第三失析薪又曰正立教中復指深密三輪法中後二是始終二教者評曰此師第二引正立教中文者又迷祖述就法分教特列三種乘法初小乘法二中間三教三乘法三別教一乘究竟法且中間頓終始三教雖則存三泯二不同而終頓之一形對三故皆為三人所得故並化三乘也然有頓漸之殊以頓教三乘始終俱離自為一教漸三則開出終始故祖曰三惑開為三謂於中開出始終二教即如上説深密經等三法輪中後二是也是知祖就乘法分教故指深密後二法輪通攝始終也祖自結曰此約法分教耳若就法義如下別辨別辨者即下所詮差別并探玄第九門以義分教中辨也是知約法通攝約義局判故演義曰法約自體義是所以法總義別也據此證知法總判攝義別所以是知賢首初在教章約深密經部法體寬通總攝始終後在探玄約相宗義局出別所以宗計義別唯齊始教也復師不詳祖意約法約義判攝自殊返謂賢首曰初作教章以法相第二時為始第三時為終後述探玄方自改曰第二第三俱為始也又注差當曰舊立始教依法鼓經以空為始故立始名至探玄中亦名始教釋名有異而不但用空義釋名却用未盡大乘法理釋也又於析薪第二卷引探玄曰始同終別三謂同聞般若同觀無性三乘之人各得自果如前所引説若據聖諦緣生六度行異亦得名為始終各別此是第二第三時教也問彼以二三時為始教前何云第三時為終教耶答只由此義一祖自語相違故知探玄中方自改於斯義故以二三時合為始教也嗚呼復師深昧祖文重重失理始違教章就法分教祖依深密經部法總寬通以後二法輪通攝始終二教也次迷探玄以義分教祖以相宗宗計義別二三時義局合為始也是知賢首兩處祖文就法約義寬局判攝前後無差法義無違復師率情昧祖述意而自臆説釋名之異返彈賢首自悟相違後至探玄方改斯義謗祖之𠎝犯重曷懺為第四失析薪又曰決擇其意第三門云小乘及初教根不定故堪人始終二教如深密説者是此上三説正以法相宗第三時為終教也評曰此即第三引決擇之文者又失祖意祖以約法就機決斷揀擇如來一代所説經法所化機性於此世中小乘及初教等機依何經法入何等教攝即便定者故祖曰初時見轉小乘法輪中時見轉空教法輪後時見轉不空法輪如解深密經等説也以此照知祖約經部法寬三時攝機故作是説即非許相宗宗計三時通性終教也今謂復師公違祖述以相兼性失且性相兩宗此方西域自古相排疏鈔溢目誰不通曉獨出此師抱自臆説以相濫性為第五失宗源既錯向下諸説總成其非繁不具辨第三會師述焚薪記曰夫別教一乘圓融具德卓絶獨立餘如虗空縱收諸教一一同圓故曰唯有一乘更無餘也今謂評曰此師述記破斥析薪主意矜高要名聚衆媒衒求達誇耀於他不伸正道唯多詰破巧結過名設有片言猶為徑庭且如卓絶獨立之句失在自相名別違祖隨機釋別也且圓通法本具足主判別別無盡了非獨立也公違至相釋別教曰又一乘之法對機以明別非謂自相而可別隨機論別相別別具十以顯無盡也又違觀序曰佛身一毛端則遍一切含一切也世界爾衆生爾塵塵爾法法爾無一法定有自體而獨立者故四祖曰為一中多即是別也又違演義曰孤標獨立者即前多中無一性一亦無有多二法互無故得獨立亦一即多而唯多多即一而唯一廢己同他故云獨立今謂初義一多性泯自相果絶二法互無得獨立名次義一多性遍隨機互習普入佛德得獨立名即非卓絶獨立餘如虗空成斷滅過也返顯佛乘一法界性體虧圓遍失且如本經常以虗空喻顯法性包含無缺曰譬如虗空一切世界若成若壞常無增減何以故虗空無生故乃至菩提無相無非相無一無種種清減科曰體離虧盈疏又釋曰虗空無生體無增減菩提無相成不寧殊故下經曰廣大周遍無處不有不離不斷無有休息疏又釋曰不離結上無處不有不斷生下無有休息故得普收諸教一一同圓主伴圓融具德無盡也或執祖曰或但自攝同體一門中無盡何以故由餘異門如虗空故不相知故自具足故更無可攝也若作此執謂餘如虗空者是不曉餘異體門喻如虗空無盡也故祖結曰如此一門既具足無窮箇無盡及相即相入等成無盡餘一一門中皆悉如是各無盡誠宜如是準知同體異體二門法義重重無盡餘如虗空無窮無盡非言一乘法體獨立餘外如虗空為第二失已上三師昧別圓旨迷失宗源不明本末混亂揀取略提十一失次評偽説同教如右初同教䇿主會師立一種同教取至相曰經云會三歸一故知同也多義如彼又曰今以理求通之與同無別趣也今從至相評曰會師斥前二師立三同四同之非自立會三歸一同雖依祖句而迷祖述祖以同字一言立教總名統目諸教本末法義利機差別詮法淺深融與不融各自等殊故有句義名同凡有二十餘同略如前顯其中會三歸一同正屬義句同也是明法華會破權漸三乘直至露地等授大車故名會三歸一止是會漸一義名同即非多義如彼違祖昧義略敘七失且初不曉祖立同字一言為總失二不曉法華經旨唯會權漸不會頓機而言多義如彼失三抑華嚴究竟圓同返為法華方便會漸同所總失四抑法界緣起理實一體同義返為法華會機破漸差別同義所總失五昧泯二同同泯二乘無三可會故名同教一乘即非會三歸一所總失六昧同頓同實同從合後三為一實以不辨圓融具德故故開為同教一乘即非會三歸一同義所總失今謂會三歸一止可總收三一和合同回三入一同其餘諸同皆是諸教各詮法義開合不等各隨差別義句以一同字通目目為同教耳故四祖曰又會義不同多種法門隨別取一義餘並別相故言同耳是知義非一準雖各各有謂而以同字一言為總通目決不將法華會漸同義為總同也又引祖曰今以理求通之與同無別趣也今從至相者足知此師深昧祖文錯亂祖意今謂四祖正意釋顯古德立通同之名非釋會三歸一同也故彼文具曰前德已求通別二教而未見釋相今以理求通之與同義無別趣也照知此文遵古立同之由非指會三歸一通同多義如彼也迷祖正意順情臆説為第七失已上矯亂教門從此為始惑衆鬪諍惟事掠虗無修實行華嚴經曰自説為是餘説悉非清涼疏曰願諸後學審此省躬無黨師承同群墮溺矣二易簡記主豫師釋教章首立法界混融無二同曰後同教門直就法界本末融會故下章曰此同教説諸乘等會融無二同一法界評曰此師匪唯迷祖同字一言抑亦不曉章文法義章曰同教者三字是辨指教名也説諸乘等四字明教下攝機具彰本末也會融無二同一法界八字正顯理體融會同也是故賢首初分諸乘以一為本三乘至無量乘為末六重七義具釋如章二融本末融會諸乘同證法界同一理體故云無二故祖下文問答結顯曰義門異故權實恆存理偏通故全體無二等豫師將理體平等之一同總法義差別之諸同此乃理齊義不齊為第一失因茲有會師斥彼曰此中引文不盡復錯亂宗因今謂會師只知情尚入他非不覺觸言自招過且宗因明論凡説法義當立三支比量其三支量當取外境比較對法立量也其惑就文取義則立量不成今會師斥他曰引文不盡等句意取下文泯權歸實門攬實成權門來作因云同喻比量者返自不曉三支比量義也今謂只就本句作三支比量者應云同教是有法量有一乘三乘法故定説諸乘等同一法界為宗法量因云會融無二同喻如海波量云海喻理實一乘波喻事權諸乘會融無二同一海水事理無礙同一法界也若取次文義句作因比量者而非同喻之境則比量不成矣幸覬達識學流去情參照莫黨師説重增鬪諍已上豫會二師偽説法界混融同各具一失辨三一和合同豫師立第二三一和合同易簡記釋教章攝益中同教一乘曰此即一乘三乘和合説故屬同教攝前別教一乘即是圓教權教三乘即是始教同教一乘即當終頓故清涼玄文云三同教一乘如法華等演義釋云即合終頓二教也評曰此師先取教章攝益中三一和合同立為第二種同教略不明解和合之義為第一之失次引玄文總相會通文云前別教一乘至即合終頓二教等文釋此三一和合同者了無交涉不唯昧於玄文泯二同義實乃不明三一和合同義為第二失及至易簡下文引昔人釋云亦名回三入一教者但立名有異即是上三一和合也決知此師昧此兩同名義不照賢首於下決擇會機次第以第七門曰三乘根不定故堪進入同教一乘乃至曰諸有所修皆回向一乘等正是三一法行和同義也以第八門曰三乘根不定故堪可進入別教一乘者即知彼三乘等法本來不異別教一乘何以故為彼所目故無異事故唯顯一乘無三可得勝前三一法行和合回向名同此門正當露地等授大車究竟唯一故名回入以入揀向勝劣自殊決非重名為第三失復師立四種同教第一立三一和合同析薪記釋曰此乃三一合説則三乘和合不異又曰三一合明又迷會解記釋玄文曰三一共故又注同教䇿曰三一具故評曰此師凡有五釋混雜媕婀略無定義及至續注同教䇿曰三乘為教一乘為義總為臆説又初記曰三乘一乘和合不異者有濫別教該説文曰以三即一故不異以一即三故不異今謂此師將別教法本圓融三一不異之義釋今同教三一和合明不異者得非矯亂同別不明兩處三一機詮法異總為一失會師同教䇿曰三一和合同一善巧故名同教此乃以合釋同同者合也則三乘為教一乘為義和合不離攝機成益也評曰此師初摘教章攝益中四字曰三一和合及至釋義錯指至相曰同一善巧為合釋同於戲此師不詳祖述穿鑿太甚今具至相文曰同教者亦有同別一乘三乘同一善巧是其同也各為據機別即是別也請詳祖述自明同教中自具同別兩義以一善巧法具接一三機故是同教中同義也若據一三之機詮法淺深各別不同是同教中別義也即不曾説和合不離以合釋同也是知此師不唯不曉三一和合同義實亦不明同教中同別義也為第一失次云則三乘為教一乘為義和合不離等者臆説尤甚今謂賢首正文先明教義後辨攝益初教義門中以臨門三車為教界外別授大車示真實義三教虗説無實體故故清涼曰是知三皆虗指演義釋曰以證三乘皆是方便無有實體乃至曰約教則廢三立一三教虗説約理則開三顯一等三虗一實豈容和合不離耶又況賢首就前教義中約開説曰三乘三句第二句曰或唯教非義約同教説一乘三句第二句曰或唯義非教約同教説及後總合曰具此三句約同教説者即是具上三乘三句一乘三句互望對論唯教唯義總屬同教門中説開説合非是獨約教義和合也是故賢首就後攝益分齊中方説三一和合同會師公違祖述矯亂教義攝益二門臆説三一為教義和合為第二失今遵清涼會通法華經旨會三為一顯法行和合故演義曰謂有問言若會三歸一者為會昔三而為一耶為會昔三歸今一耶故今釋之具上二義先明會三為一初別藥草喻品證小行即是佛因次引信解品證大行是其所有皆明會行也次明會昔三歸今之一於中二先會昔成今有法喻合法云義説為四等乃至借喻顯曰以三點喻於三乘以成一伊喻為一乘別説三乘三皆是權合三為一故得稱實非三點外更有一點乃至結成正義曰三別有三總合為一故成四也四即四乘義説為四也次曰彰今異昔下揀曰前但合三為一一無別法已成四乘今辨一乘別有法門乃至曰唯為一大事出現於世不為於餘等此顯露地等賜大車回三入一唯是一乘不同三一義説四乘明法行和合也會師不遵祖釋臆説教義和合為第三失已上三師偽説三一和合同共有七失次評泯二同如右復師立第二種同教依玄文曰終頓泯二是同故合二為一教此師述會解曰要終頓二教同泯二故名同教一乘也仍自注曰約終頓泯二是同非即合終頓為同也正約終頓同無二乘故云同教一乘也又注同教䇿曰此合為一教者即由終頓同眠二故合為一教名同教一乘也豈非得名之因又注曰今問彼曰不將泯二為得名所以更用何耶評曰復師曲説繁重自意錯亂先述會解注曰泯二是同非即合終頓為同後注同教䇿卻曰此合為一教者即由終頓同泯二故為得名之因前後相違成第一失其次兩重注説決知不曉二教詮法體同合二為一為名同教一乘但執得名因由所以者虗立教名不彰法體為第二失會師同教䇿引清涼曰始教存三故別為一教終頓泯二是同故合為一教下列四中云三同教一乘即合終頓二教也會師就解曰此乃泯二是同出合為一教之所以非得名之因由也評曰此師但引祖文不釋合二之義唯言出合為一教之所以語無的當過同復師因由之失今謂祖約會通古師立四教義故下列四曰一別教小乘如阿含等二同教三乘如深密等三同教一乘如法華等四別教一乘如華嚴經其同教一乘正以今家終頓二教教下同詮一乘法體同泯二乘克體一合也故演義曰此通終頓二教但同一體是頓兼不壞能所知義即是終此明二教頓漸雖殊克法體合也會復二師皆不明乘體一合但言出合所以得名因由者無稽臆説為第一失又因由所以但是左右之言義非兩異故演義曰所言因者所由所以順益待藉之義相也為由有此所由所以順益待藉果宗方明故説此等名為因也此即要是宗之所由亦是宗之所以等由此即顯與所立宗一向一味能建立宗故名因也會復二師不照祖述各執因由所以互生鬪諍惑亂後學為第二失次引貞元疏曰約圓融不融分成二種即頓教實教並皆不融為同教一兼䇿曰既曰不融為同非泯二名同不亦顯乎又此同教一乘是合終頓義亦明矣今謂評曰此師要將泯二同與不融同兩同義齊並合終頓二教為同教一乘者大失教眼不曉兩同來源自異名義各殊且泯二同自屬玄文總相會通以今家五教束為四教會通昔人判四教義也故以終頓二教乘體唯一合為第三名同教一乘同泯二乘故故名泯二同也其不融同自屬貞元約合後三教為一實以最後圓教為究竟佛乘具足實體圓融無礙為融為別名別教一乘以頓實二教雖同詮一實實體未圓故開二教名不融同故貞元疏曰二約圓融不融分成二種即實教頓教並皆不融為同教一乘唯第五圓融具德名別教一乘也以此照知兩同名義雲泥自殊略伸三異初泯二同從會通四教中合終頓為第三同教一乘也不融同從五教中合後三為一實以終頓詮實未圓故開二教名不融同此昧四來合二五來開三來源自殊開合不同為第一異失次泯二同自約乘體一合合二為同教一乘也頓實同自約詮法不融開二為同頓詮雙絶名絶相一乘終詮雙存名佛性平等一乘此昧乘體為合詮法非合為第二異失次泯二同唯局終頓也頓實不融等同通前四教皆名不融以教義理事等十門隨教淺深孤門性相故演義曰各隨五教以辨差別諸教共有故云可思今此獨開終頓者以同詮一實就勝先開名同教一乘也此昧通局穿鑿類齊為第三異失三異之失兩同決殊會師應説公違祖述惑人鬪諍又引地經疏鈔曰若自他相絶則與衆生心同一體故無心外也不壞能所知義也自釋曰此通終頓二教但同一體是頓兼不壞能所知義即是終教若總取雙絶雙存亦圓教中同教義也會師䇿曰既稱總取合二教也亦圓中同非離之之終頓乃海具之江水安得不鹹正同此間之同教一乘也評曰會師摘文臆説誣惑後學益增鬪諍今具引疏鈔顯祖正意祖釋第三地經他心通文經以他心通為總下列二十八心為別行相各殊經末結曰皆如實知疏曰審於事實見理實故亦非心外見法亦非無境可知若自他相絶則與衆生心同一體無心外也不壞能所故能知也又他心是總餘皆是別六相圓融一乘之實知也鈔曰皆如實下總釋如實知義有五教意初通小乘初教理實通人法二空故二亦非心外下通始終二教唯識之義通二教故三若自他下通於終頓兩教但同一體但是頓教兼取不壞能所知義即是終教又總取雙絶雙存亦圓中同教義故四又他心下六相圓融唯屬圓教一乘之別教義今謂鈔文通論五教束為四義又加同教初通小始二教二亦非心外下約唯識義通知始權異熟賴耶名為一心遮無外境唯心變故通知終實説如來藏以為一心理無二故性淨隨緣舉體成俗即生滅門也此束二教通唯識説權實自殊非合二教也三若自他相絶下約真性義通知頓教泯絶染淨呵教勸離毀相泯心俱同衆生本有清淨一體名頓也兼取不壞下通知終教具足真如生滅二門能知心體所知心相故束二教通知一乘真心體相也故頓教通知心體絶相終教通知心體心相兼之一字揀非合二教也故鈔明曰通於終頓兩教不言合終頓兩教也又圭山顯一心具五義門揀後三門曰然此亦一心與上第三四門異者三是攝事歸理會末同本四則泯事泯末唯理唯本五則全事即理即末全本等以此照知三教一心心智義殊即非合論也又總取雙絶雙存亦圓教中同教義故者是顯圓教本法總取前四教存絶法義名圓教中同教也總取小教六識心知雙存事理皆審實見總取始教八識心知雙存心境皆識所變總取終教一真心知雙存體相能所無二事理無礙總取頓教一真心知雙絶體相能所染淨事理俱泯最後圓教圓心圓知總取前四即末全本存絶鎔融事事無礙即是圓教不思議圓通同也故曰總取也如江水入海波波俱鹹故曰總取即非獨取終頓合二為圓中同也故清涼曰圓以貫之故十善五戒亦圓教攝圭山亦曰圓教攝四之時一一同圓會師違祖情尚臆説改總取為獨合終頓作圓中同廣引祖文展轉穿鑿惑亂後學益增鬪諍為第六失次曰正同此間之同教一乘者又增惑亂今謂此間泯二為同教一乘者祖自明曰如法華等即是方便一乘自屬全揀名方便同教也若以華嚴究竟圓別一乘為能總取前四教法義一一同圓自屬全收圓中名同也是知兩種一乘方便究竟自殊兩種名同揀收縱奪自異會師更不辨明一槩斷云正同此間之同教一乘者得非矯亂同別兩種一乘益增鬪諍為第七失更有復師注同教䇿曰泯二非圓中同曰如探玄曰於共教三乘中分出故知非圓中之同今謂復師雖引祖文而又偏執亦不曉圓同具揀具收有縱有奪若全揀則揀前四教皆屬方便名同若約全收則收前四教一一同圓皆屬圓中名同復師執云故知非圓中之同者偏執之失會復二師皆暗斯義各廣穿鑿益增鬪諍為第八失次引密祖曰能所無二大乘終教也能所俱泯大乘頓教中證道也觀祖曰以能所歷然證事法界能所一相證理法界及事理無礙相即之門能所具泯證事理無礙形奪無寄門存亡無礙全證事理無障礙門舉一全收證事事無礙門會師䇿曰能所存亡無礙得非總取雙絶雙存圓中同教義乎是乃合前密祖之終頓也舉一全收證事事無礙別教也此前更不別立圓中同又於終頓之後別有此門義可見矣今謂會師併引兩祖能所存泯文義要證臆説總取雙絶雙存是合終頓作圓中同者大迷兩祖文義矯亂五門證道不明前後開合有暗兩重證智今不避文繁具彰兩祖正意先明密祖依觀祖貞元第三科曰能所契合中別明智證以顯五門前之四門是約無分別智證事理無礙法界也為方便同教之極至生後第五門舉一全收收前四門名總契合歸圓別教是顯無障礙智證無障礙事事無礙法界也是故密祖依貞元科隨門牒釋曰第一能所歷然者則法相宗證道謂大乘始教也第二能所無二者法性宗證道謂大乘終教也第三能所俱泯者則大乘頓教中證道第四存亡無礙者必由能證方悟心體本絶能所三門無二也第五舉一全收者總收也前四但存泯此門又收開合以前三門則存泯開第四門則存泯合第五門復收開合也故迤邐五門方備也故貞元結曰上列四門者一則欲次第階道二欲會衆經異説是知前四門唯顯性相無礙至第五門方説圓極圓同故祖下曰以性融相相隨性融令前四門合為一揆德德無盡相相無窮方盡圓旨方立圓同也又密祖記釋觀祖別行疏曰但約無分別智證於真理有此五門義記釋曰上但約下雖結前五亦生後文勢言但約者意表義理未盡四法界唯一也就一之中有此五門法相是知兩祖正意皆以前三門説有前後存泯即開配始終頓三教各論證道顯非獨合終頓義甚分明以第四門存泯合故合具前三次第階道義欲會衆經異説義合顯修入之機皆依無分別智皆證事理無礙法界與同教作方便引攝故當名方便同也至第五明舉一全收收前四門開合等義方盡圓極方具總取存泯之義具德無盡方立圓同此義正如前辨地經鈔中總取雙絶雙存為圓同義也以此照知會師始迷地經鈔中總取存絶之義終暗此中舉一全收之義皆因迷此五門不曉前四唯約無分別智唯證事理無礙法界為不融同教之極至不曉第五門約無障礙智證無障礙法界融前五門證道一一同圓舉一全收方名總取總取前四門四教存絶法義一一同圓方許説立圓中不思議同也即非獨取第四門存絶之義獨合終頓為圓中同也故密祖記曰若以無障礙智者即如理智如量智乃至三智四智皆無障礙以成重重無盡也無障礙境者正事事無礙法界含攝事法界及理事無礙法界皆無障礙亦總成重重無盡也貞元亦曰若證事理無礙及事事無礙法界者但如前法界信解明了則心行自造豁然證入此顯一道竪窮展轉玄妙非初法界外別有第二第三也已上義門照顯會師迷前暗後矯亂祖迷錯説圓同獨合終頓聾瞽後學日增鬪諍為第九失次引密祖釋理事無礙中至存泯同時則迤邐有此三重事理無礙之義方足智者一一審之會師䇿曰即前觀祖能所一相所證事理無礙相即之門一重也能所俱泯證事理無礙形奪無寄門二重也存亡無礙全證事理無障礙門三重也如次前二祖取之第三重乃圓中之同如日月矣非合終頓乎今謂會師次引密祖迤邐三重所入之文配同觀祖雙融能入之文不明祖述矯亂能所又招二失第一不曉密祖自依貞元所入科中曲有十門以前七門總為一處為事理無礙就第七門後結曰迤邐三重事理無礙之義方足乃至曰由上義成下三門事事無礙義也貞元亦曰後三即事事無礙法界以此該前更無事理別行一多不即故唯歸一無障礙法界而舉一全收照上兩祖文義並在所入法界科中十法門義結前七門迤邐三重唯顯事理無礙法界義雖備足為同教之極致而尚拘事理別行一多不即揀其不融為方便同義甚明也以後三門即事事無礙該前七門歸一無障礙法界舉一全收一一同圓正顯圓融究寬圓同也會師迷祖所入科中事理無礙三重法界之義却將觀祖能入科中能所契合五門證道之義配齊所入三重法界之義不唯矯亂能所實抑錯合終頓臆説圓同為第十失又云前一祖取第三重乃圓中之同者今謂兩祖明文結上三重唯顯所入事理無礙法界一多不即唯齊方便同義祖無明文將此所入第三重法界為獨合終頓名圓同也此語無稽情尚誑説為第十一失次下更引五處祖文要證泯二頓實兩同並為圓同收者總是穿鑿繁不多辨今但略明祖意各各自殊決非混亂且如次引觀祖釋事理無礙曰會法性等文者今謂觀祖正意以法性是一會其終頓同詮一性詮性未圓存絶兩異故合後三同詮一性性相對揀之義即非獨合頓實泯二兩同作圓同義説也此是雜亂祖述類例不齊為第十二失次引密祖曰具此十門乃至別教等文者今謂密祖釋法界三觀於理事無礙觀下注曰具此十門當大乘同教之極致對後事事無礙觀十門當別教觀也主意對顯同別兩機明心觀法進趣行門非辨教門總取存絶等義也此是雜亂教觀類例不齊為第十三失次引觀祖曰實教大乘亦名一乘謂會三歸一唯有一乘法故即後三教合為一實性相二宗有多差別略列十條此能揀十義亦即此經中同教之義密祖亦曰即華嚴同教義會師䇿曰此亦後三合為一實開二即同別開三即圓終頓也是以為四即但有同別是合取頓實即圓中之同也以一乘三乘小乘三宗不同一乘有二故今謂評曰實教大乘下一節祖文貞元正意合後三教為一實是顯法性對揀前二教為權是顯法相三乘略列十義對揀性相權實定異故祖明曰會三歸一十方佛土中唯有一乘法者是約法華同教通相一乘對揀權三乘也即非華嚴別教逈別一乘為對揀也若爾何合後三皆名一乘耶故祖揀曰一乘有二一別教一乘二同教一乘今謂合三是約性實理體同義通相一乘為合後三下約具德逈別一乘為合也若爾祖何又曰此能揀十義即此經同教中之義既言此經明知是圓何妨會師曰是合取頓實即圓中之同耶今謂此師從前至此迷於開合不曉圓同且諸處祖文曰華嚴別教究竟一乘為諸教本故法界大宗故總相法門故具同別故具本末故具性相故具權實故故祖指曰能揀十義亦即此經中同教之義由此只曰同教不曰圓同者良以合三是約法性通相一乘方便引接名同也若具圓中同義乃於後三開一圓教同前諸教圓融具德一一同圓方説圓同義也故賢首曰或唯一圓教以餘相皆盡故或具五教以攝方便故乃至曰或開二開三開五等是故諸教所明義理交絡分齊結成教網長養機緣故此經云張大教網置生死海中漉人天魚會師深暗斯義不明開合只見祖云即此經中同教之義便作圓同義説者惑亂後學日增鬪諍為十四失次曰開二即同別開三即圓終頓也是以為四即但有同別是合取頓實即圓中之同者此師違祖臆説開二開三等語且貞元就實復有二門者第一門曰一約有位無位分之為二則以終教同前始教皆名為漸第四名頓即非開二為同別也第二門曰二約圓融不融分成二種即實教頓教並皆不融為同教一乘唯第五圓融具德名別教一乘今經正是第五教攝以一一圓融包攝無盡故更無餘文餘義即不曾有開三加同為四亦不曾有獨合頓實為圓中同義祖但明曰即實教頓教並皆不融既是不融開為同教一乘揀非圓同義甚分明會師從前違祖情執穿鑿獨合終頓為圓同者於斯總錯為十五失會䇿又曰已上第二義彼所立義既破引文證又不成理量今謂此師此語逆風吹火還燎自眉矣已上復會二師偽説泯二同共有十七失次辨偽説同頓同實同如右豫師取玄文同頓同實同立為第三種同教易簡記釋教章以教攝乘中同別一乘文下注曰有以玄文義理分齊中同頓同實同及圓融具德配此同別然乃教下曲分義門與今以教攝乘義意亦別此可會於清涼玄文總相會通或分四內同教一乘如法華等評曰此師言有已下至義意亦別不曉玄文先明教攝曰圓必攝四圓以貫之故十善五戒亦圓教攝次門乘攝曰一乘有二一同教一乘同頓同實二別教一乘唯圓融具德是約圓融不融以揀同別二機詮證淺深正顯被機之義故分同別此師不考祖文擅自斷云然彼教下曲分義門與今教章以教攝乘義意亦別者匪唯不曉玄文教章並是以教攝乘正顯利機却乃謗祖為曲分義門非約被機而曰義意亦別為第一失次曰此可會於清涼等文又是不明兩處祖述矯亂法義且玄文總相會通之意自將今家五教會通古德四教以今終頓二教同詮一乘同泯二乘體合為一會通四教中為第三同教一乘如法華等也今此教章自就本宗五教通攝一三乘機隨攝各五且初一乘五者一別教一乘二同教一乘三絶相一乘如楞伽此頓教四約佛性平等為一乘等此終教五密義意一乘如八意等此始教已上五種一乘皆是隨教單攝為一不同總相會通合二教為同教一乘也是知兩處祖意單一合殊義非可會為第二失復師會解記取玄文同頓同實同立為第三種同教曰三此中同教要同教與終頓二教義類相似故云同也又注同教䇿曰此約同教同彼終頓故云同教不約終頓亦名同教評曰文繁義晦以教為同自招三失初昧祖述約法判教教類有五施設教相約機造修斷惑證相淺深自殊決不濫觴此師却曰要圓教與終頓二教義類相似同者返顯吾祖約法分教義無約準悖祖臆説為第一失次注同教曰此約圓教同彼終頓者正違祖述祖以終教之機同詮同教中一性一相法義頓教之機同詮圓教中言思斷絶法義也以此二教雖皆詮圓教中存絶法義而皆未足圓別圓融但是孤門有其所病故祖揀開曰同頓同實同也演義釋曰同教者謂終頓二教雖説一性一相無二無三不辨圓融具德事事無礙故非別教而別教中有一性一相事理無礙言思斯絶同彼二教以此照知祖約詮法之偏名為同教即非約圓教同彼終頓也為第二失次曰不約終頓亦名同教者今謂祖述正以終頓同詮同法未足名同若不約終頓名同却用何教為同耶足知此師率情迷亂誣誷學人為第三失會師引清涼曰同教者謂終頓二教雖説一性一相無二無三會師䇿曰此正同教自相也理應更曰言思斯絶以影在下文不言耳無二無三非泯二乎問曰同彼頓實安知合彼為同教耶答祖云下同同教釋此言也評曰會師碎節祖文不聯義勢具如復注曰然此鈔曰雖説一性一相等是縱彼二教但是所同次曰不辨圓融等奪非別教後云而別教中有一性一相等同彼二教方是正立同教名相此説頗正令師錯在初段以縱為正曰此正同教自相為第一失次曰無二無三非泯二乎者此師從前臆説泯二頓實兩同之義皆是合終頓為同至此言非泯二乎者核定之詞更不詳究清涼只在頓實同下言無二無三於泯二同下不言無二無三者祖有深意揀異兩同也以頓實同是合後三教同詮一佛乘性本不説有二乘三乘唯顯一佛乘性故演義明曰但立一實為真趣舉二三皆悉不許不論大小如説世間此人獨立更無與比非要別指張王二人等今緣頓實於佛乘性詮體未足不辨圓融具德局在孤門存絶各殊開而非合故以同字開曰同頓同實也其泯二同自約會通四教合終頓二教為同教一乘對三顯故不言無三但云泯二也故祖明曰三四二教雖則泯二異前而對三顯一曲巧順機演義釋曰三即終教四即頓教此之二教俱明一乘故云泯二則異前始終存三乘也是知泯二之同對三顯一只言泯二不言無三也頓實之同本無二三可對故言無二無三也兩種同義約法對機淺深自殊決不類齊會師不詳祖述擅於頓實同中無二無三句下便言非泯二乎者不明教眼雜亂祖述為第二失次問答下會師自立問端答釋指文尤迷祖述演義四十四釋十門唯識鈔曰若下同同教一乘即收次三就實次三唯識門也即第五以末歸本門第六攝相歸性門第七性相俱融門祖曰其五六七三門全同問明但為明其自淺之深故曰通二一即終教亦名實教故其攝相歸性亦通頓教以後三教皆同一乘並揀於權故頓亦名實今謂祖自明曰通二者通其終教一性一相通其頓教言思斯絶以其二教各詮一義自淺之深故曰通二通即同也故兩同字曰同頓同實者顯非合二也設或情執終頓共通一實故言合二者公違祖曰合後三教為一實即不曾言合前二教為一實也是知會師答指此文改祖通二之言妄作合二之説攖惑後學重增鬪諍為第三失次下又引不辨圓融具德事事無礙故非別教又曰而別教中有一性一相事理無礙言思斯絶同彼二教今謂此師引上兩段祖文正是碎節祖文不聯義勢具如復師破曰不辨下是奪又曰下是立會師不得文意從前三段至此意顯皆在後句同彼二教方是結釋疏中同頓同實為同教也文意極明不必繁重雜亂祖意為第四失次曰問信滿成佛行布十地同前諸教能同名同豈非同教同彼耶答彼約一乘同三乘方便引彼令捨權入實不待該而是圓今謂此師所引教章問答信滿成佛之義深味祖述妄作圓同也且祖明答曰為欲方便顯此一乘信滿成佛令易信受故於彼教先作此説至後又問曰若爾云何説得諸位階降次第答以此經中安立諸位有二善巧一約相就門分位前後寄同三乘引彼方便是同教也二約體就法圓融自在異彼三乘是別教也以此照知前後問答是顯別教具二善巧其信滿成佛是初一善巧約相就門寄同三乘方便引接正屬方便同教義即非第二善巧約體就法相入圓融同義也會師不詳祖述檀於初一善巧義中斷曰令捨歸入實不待該而是圓者不明善巧二門矯亂同別濫説圓同為第五失次曰今約所詮事理無礙是一該取二教所詮入圓成此彰其無礙如浩然氣同雌雄風總斯二風以為一氣浩然外無別雌雄雌雄之外寧有浩然事理無礙同存絶即泯總斯存絶為事理無礙道理亦爾豈二事理無礙分能所耶會師此段語意法喻合三又成三失初約所詮下有昧玄文前約總收後約總揀今論終頓二教所詮理事無礙正屬總為揀同故演義曰終教不説德用該收頓教一向事理雙絶乃至曰同教者謂終頓二教不辨圓融具德等此師公違總揀却云該取二教所詮入圓成此彰其無礙探取別教四門義説者以同濫別矯亂揀取為第六失次曰如浩然下不曉風氣兩殊妄用雌雄偽説今謂浩然元氣虗廓寂寥本自無形無動無聲無大無小無內無外無明無暗無智無愚無富無貧無貴無賤偃伏天地之初發生萬物之祖皆是自然噫氣而出故河圖曰元氣無形蒙蒙偃者為地伏者為天又禮統曰天地者元氣之所生萬物之祖在物稟受詮分各殊則有愚智則有明暗則貧富壽有短長故曰小知不及大知小年不及大年等其風者有形有聲有起有滅有景有頺有焱有忳有短有長等從天所使隨時而作故河圖帝通曰風者天地所使也又元命包曰陰陽怒而為風也以此照知風與氣殊但同運四時氣含風變風謝氣存何得曰總二風為一氣以一氣為二風得非不考文籍情臆妄乎況當宋玉一時奉主偽説雌雄故真儒斥曰上古聖書風有多種本無雌雄二風只有雌雄二雷也若吾宗祖述風氣二義息氣從踵發緣風依欲身故有偈曰息念慧五地緣風依欲身二得實外無有六謂數等今略論曰謂持息入是引外風令入身義謂持息出是引內風令出身義委釋如俱舍又智者修息正氣曰有聲曰風結殢曰喘不細曰氣不聲不結不粗不澀不滑出入綿綿若存若亡資神安穩方曰息守風散喘殢氣勞息定無念正定氣無為也是知內外典籍氣恬風撓兩異皎然此師昧亂而云總斯二風以為一氣者為第七失次曰事理無礙道理亦爾下合法不齊錯今謂風氣兩運是妄緣境止局一順彌一天地一日月一四洲衆生共業緣成則有緣散則滅若事理無礙談真常境量周法界廓徹虗空處事則事事全真顯理則理無不遍事理雙融故曰無礙帝心曰此全遍門超情難見非世喻能況清涼釋曰借其分喻通其玄意故以海波為喻海水喻理海波喻事事理相即一體無二也若將妄塵緣起風氣小境喻合真如法界事理廣境喻理不齊此師却曰道理亦爾者不遵祖喻違理極多繁不具辨為第八失次引祖曰以別該同皆圓教攝鈔曰猶彼江水入海亦鹹會師䇿曰既俟別該即偏教之終頓非能同別教也又言江水入海非自海水即終頓為此之事理無礙明矣指圓教則總取雙絶雙存圓教中同教也今謂此師引上疏鈔要證圓中同義正出此文者大昧祖科科分兩義以別該同皆圓教攝者自屬前科總明大意文後通釋妨難也故鈔釋曰謂有難言既同頓同實何異頓實故此通云即此同中必有別義如事理無礙必有事事無礙耳猶彼江水入海亦鹹以此釋通深廣之意竪窮橫遍普該普攝不論入與不入體是同未入海時鹹德未具故但云同故祖科曰總明大意大意者祖曰如海有百川之水水義同也若江水入海水體具德波波圓攝同同無盡方攝圓同自屬後科開章別釋中明別教四門下義一一圓同也會師錯認前科總明大意顯顯體之同通妨之義便作圓同具德義説者不識文理混濫圓同不分體德暗祖科釋為第九失次曰圓教有二一同教二別教別即不共不共頓實同教者同頓同實若下同同教一乘等會師䇿曰既言下同同教一乘收次三門唯識則同教一乘是終頓何不得稱此名耶既曰收之是海具之江水不同長江也然海中江乃收長江同昧其別教同彼言下同也今謂會師引祖文魯祖義矯亂同別且鈔初顯別教圓證究竟一乘乘體具德法法圓通逈異諸乘諸教故曰不共不共頓實也次顯同教者指上頓實為方便一乘乘體雖同但是孤門未具圓德故祖揀曰同頓同實明知頓實以不融義故揀為方便同教即非圓中圓通同也會師公違祖揀擅曰收之是海具之江水為圓同説師此説以析收曲説圓同為第十失又引下鈔釋十門唯識義曰若下同同教一乘等此師前設問答中錯指此文已如前斥今又引證例作圓同者又迷祖鈔釋十門唯識曰約教分別即具五教義以前七門配前四教涉權就實為方便同教以後三門獨配圓教總前七門四教全收諸乘一一融通方名圓通同教故鈔節釋曰若下同諸乘下約融通説若下同同教一乘即收次三教實若同於三乘亦收前四以其圓教包含具故今謂鈔具四釋初若下乘諸乘一約去含圓別圓同故疏曰通十無礙一部約宗機全揀以法未融以五六七三門唯識配顯終教雖實而實體未圓以不融故名同教一乘也三若同於三乘亦前四者以前四唯識門配小始二教名權教三乘也已上前十門唯識配前四教並屬所揀詮法未融為方便引接名方便同教也第四釋曰以其圓教如海包含無不具故以最後三門結顯圓教法本融通總前七門四教一一同圓為全收圓同義也會師迷抄釋不分揀取檀引第二下同同教一乘雷例皆作圓收圓同説者公違鈔曰涉權就實分節四釋以初後二釋是約法通收可具圓別圓同説也中間二三兩釋是約機分齊揀實與權為方便同義甚自分明以圓別究竟一乘乘體具圓為上同以頓實方便一乘乘體未圓為下同故曰下同同教一乘也會師媕婀但曰別教同彼言下同也驗知此師不曉上下能所同法剛執下同方便不融之同例為圓通同言者公違融不融義為十一失次曰若同教三乘又收前刀曰注二四門唯識非四教也會自評曰別教一乘下同人既是三能同亦三當知別教下同終頓不應便非圓却該而入圓也以本非江水故不得入本非不融故不得等今謂鈔曰若同教三乘者是權始三乘也亦收前四者是前四唯識門也會師因迷鈔中分四節釋涉權就實等義致此妄認權三同混濫下同諸乘例類下同終頓並作圓同説者公違祖鈔四義揀釋涉權就實之義矯亂唯識十門前七後三揀同顯圓約法通收總融十門四教一一同圓方説圓通同義即非混濫不明揀收例作圓同為第十二失次曰總收諸教會三歸一得非廣乎會師始暗此義妄立總同已具前非今又指廣濫説圓同如海包含始終錯暗矯亂宗源為十三失次曰揀則三一不同同則三一和合亦斯義者明知此師始迷法華三一和合同義已具前非今暗華嚴融通同義不詳祖述華嚴教本同別之源也今謂別教一乘者揀前四教三乘逈異稱別也同教一乘初分諸乘六重七義以顯一乘至無量乘次融本末説諸乘等會融無二同一法界一三融攝權實恆存理遍通故全體無二故祖結曰或亦一亦三如同教也不遵祖結返法華破權會漸義説四乘名三一和合同類齊華嚴圓通同義擅曰亦斯義者不曉兩經同義各殊深迷本宗圓同之説日增後學唯勤鬪諍為十四失復師注同教策曰今言下同同教乃是約融通説者公違祖述本鈔只曰下同諸乘約融通説即不曾曰下同同教約融通也又注曰今下同同教即別教不異於同却令同中即有別義者此味前鈔通妨之義此與會師同暗斯義有濫圓同委如前辨又注曰收次三就實皆同圓融爾所以鈔云後三教皆同一乘並揀於權同一實也此又昧祖於合後三教為教實義中開後圓教為圓別圓融開前頓實為不融同即不曾將合後三教皆作圓通同説也復師三注又成三失大率豫復會三大知識就同頓同實同一義法門迷祖正述於諸祖文各伸情見作意穿鑿互興鬪諍惑亂後學今謂略陳二十二失次辨偽説全收諸教同如左復師會解釋玄文揀收曰此中全揀前四不攝於圓約別教説若此中全收圓必攝四約同教義説故行願鈔作此指也此約圓教收前四教同成一教故云同也故下鈔亦曰若於三乘亦收前四以同教如海包含無不具故然上四義收攝同教體勢略盡有同此類以義收之則無所濫涉矣評曰復師指行願鈔證全收為同者不詳祖述明大法界緣起即成性起約法通收收前四教法法皆圓故以全收名不思議圓通同也不遵祖述自臆説曰此約圓教收前四教同成一教故云同教者驗知此師雖引全收名同而不曉圓同法義又注同教䇿曰然圭山決以全收門只作同教不同以本收末門義説不可要此中全收諸教亦是別教照知此師決暗圓宗圓別圓同不曉玄談縱奪義深迷行願全收之同教眼不明因斯説為第一失又注同教䇿曰然則華嚴圓教具攝前四亦假法華會歸即一代時教無不歸圓者此又不曉攝會義殊矯亂全收圓同玄旨也今謂約法通收曰攝約機詮異曰會師祖明曰華嚴稱法本教第二七日同時演説約法通收教義理事等十法門義若名若義法法同圓故曰圓必攝四也若約會義乃顯法華逐機末教第三七日異時異處方便接引破異名會唯會漸三人法未圓故會名同復師昧此法攝機會臆擅而曰亦假法華會歸等説為第二失或執祖曰法華攝諸經歸華嚴豈非假法華耶今謂執此為證者又迷祖意祖顯華嚴法華二經化法是同本末相資為一大善巧法故故作此説非約化儀最後會三之説展轉穿鑿重迷祖述為第三失次曰故下鈔亦云若同於三乘亦收前四以其同教包含如海等復師擅改鈔本以其圓教作同教錯始恐筆誤以圓作同及於同教䇿就下注曰此義亦同教章所詮差別中收前四教為同教也以注照知此師誠非筆誤乃順臆恃圓字作同解釋錯又昧鈔中亦前四之言自收前四唯識門明權三乘即非教章所詮差別中收前四教為方便同義也雙迷兩處祖文錯亂圓同宗旨亦與會師同迷斯義委如前辨為第四失次曰然上四義收攝同教至無濫涉矣者此師違祖總同擅立四義為同教總而言體勢略盡者欺誣祖述矯亂諸同誑惑後學益增鬪諍為第五失會師引圭山曰全收諸教宗同教緣起義亦指大疏玄談全收之義會師䇿曰此作同教釋則是方便故賢首曰圓教或五也且取非即圓通義既曰全收諸教即前之四教謂之諸教諸涼曰圓必攝四若爾即教章所詮差別攝前之同教亦即教章之初同教以此同教始自一乘至多乘無不包故亦即賢首總收十門唯心之同清涼曰如海包含無不具故則同頓同實之義亦是此義下文亦説同三乘故章中前曰華嚴一乘後曰圓之同教非海而何至相亦曰會三歸一故知同也三即諸教故評曰此師始迷約法通收逐機分齊揀收二義終暗全收方便兩同縱奪之旨今謂圭山古記清涼玄談並顯約法通收性海圓明法界緣起無礙自在一即一切一切即一等為宗法教本攝前諸教一一圓通本末鎔融名同教中全收同義也故賢首曰或總為一謂本末鎔融唯一大善巧法又於所詮差別所依心識下曰若約同教即攝前諸教所説心識何以故是此方便故從此而流故乃至曰此有二義一約法通收二約機分齊初義者由此甚深緣起一心具五義門第五門曰性海具德門如圓教説是即不動本而常末不懷末而恆本故五義相融唯一心轉又於明佛種性中曰攝前諸教所明種性並皆具足主伴成宗以同教故攝方便故是約性辨隱顯相收故祖結曰義雖有然種性圓通隨攝遍收隱顯齊致也以此照知縱設方便同義即是全收圓通無盡同也故華嚴能開方便經曰以等法界方便等虗空界方便等衆生界方便乃至第十一句曰等一切光影方便清涼疏曰能開發方便有十一句初句總顯以含事理深廣故句初以字貫下十句謂頻申三昧業用深廣要以此十無分齊之方便方能開顯況十復表無盡光映之影隨機別故故下經列一百二門三昧疏曰皆是嚬申大用別義故以多別入佛之總諸門別義説者隨宜前百一門同別業用後一總相同果師子頻申者若不總明分同無以能佛境會師不照經文祖述方便之義即是嚬申三昧廣大業用主伴成宗為圓通同收昧而不遵擅自斷曰且取非即圓通義也語出無稽義為的準為第一失次云既曰全收諸教即前之四教謂之諸教清涼曰圓必攝四若爾即教章所詮差別攝前之同教今謂會師以玄文全收諸教中同教攝四與教章所詮差別中同教攝四兩處祖文圓攝同攝法義之殊竟不明揀擅以若爾即三字核定例齊足師不曉圓攝自顯究竟一乘約法通足已成就言即因具果通三世間名不思議圓通圓攝也其同教攝前者自顯方便一乘逐機分齊方便引攝故入嚬申三昧業用深廣以無分齊之方便開顯等佛之種性心識差別隱顯相收具前四教主伴成宗説為同攝是知圓攝約法本來滿足同攝約機方便開顯方得圓通故祖揀曰或具前四如一乘方便處説或即因具果通三世間如圓教説會師昧祖圓攝同攝兩義之殊媕婀核例惑亂後學日增鬪諍為第二失次曰亦即教章之初同教者又昧祖立同教總名以一同字通目諸教差別同義即非獨顯全收德用圓通同也會師臆斷曰亦即者雷例不齊為第三失次曰以此同教始自一乘至多乘無不包故者此昧祖約理體名同是顯諸乘權實恆存故祖曰理體遍通故全體無二也即非全收德用圓通同也雷例不齊為第四失次曰亦即賢首總收十門唯心之同者此昧祖釋配攝五教目足揀收祖以前七門唯識配前四教約機分齊人法未圓為方便同以後三門獨配圓教人法俱融約法通收總收前七四教教義理事法等十門法義一一融通法法無盡具足圓通同會師不明揀收唯言總具如海包含公違祖揀顯法融通為第五失次曰則同頓同實同之義亦是此義者會師從始至終不曉約法融通為全收圓同約機分齊為全揀名方便同此上同頓同實同義正屬全揀以不融故開為方便同教一乘正如演義揀唯識十門中下同同教義也不應臆斷曰亦是此義濫作全收圓同錯為第六失次曰下文亦説同三乘故章中前曰華嚴一乘後曰圓之同教非海而何今謂評曰亦説同三乘者如前已辨昧鈔揀釋約機涉權自屬不融未係圓融全收門首標華嚴一乘宗法圓融彳曰圓同等義者乃約法融通初後俱圓是明述章建立正意法法本圓即非類齊所揀涉權同三之錯為第七失次云至相曰會三歸一故知同也三即諸教故今謂會師始迷法華約機分齊唯會漸三錯立總同已如前斥今又臆説三即諸教有濫華嚴約法融通全收諸教公違清涼辨吉藏違曰然法華為於一類開顯本末若將定判一代聖教收義不盡以法華之前亦有大故故鈔釋曰此段會通經意以釋妨難恐有難言依於法華立義乃是一極之説如何不依故今釋云自是立教之人不得法華之意別為一類滯小之人故為此説謂執三疑一執小疑大乃至曰非欲會通一代聖言等以此照知會師決昧法華唯會一代漸三之機擅臆斷曰三即諸教有濫圓收為第八失次引清涼全收曰大海必攝百川同一鹹味圓必攝四圓以貫之亦圓教攝尚非三四等有其所通無其所病圭山大鈔指全收為一是別教今謂會師引兩祖文要證全收唯是圓別不許復師堅執全收為同失也今謂二師皆昧祖述各自穿鑿執同執別玄興鬪諍會師執別昧同有暗圭山明指大法界緣起為全收圓同此同即別顯不思議同同無盡故故四祖曰別教中由多即一是其同也此師公違祖述於前解曰此作同教釋則是方便故且作非即圓通義錯前已具斥錯至今説昧於圓同為第九失復師執同昧別雖則知引圭山指全收為同而暗祖述於前錯解曰此約圓教收前四教同成一教故云同教也此解之錯前已具斥錯至今説又注同教䇿曰今謂此中正約全收具五教一一同圓義説故義當攝方便之同也此約義相當相釋也今謂復師始攝名同錯終約義相名同錯始終不曉約法融通同別無一已上復會二師於一全收同下偽説法義共一十五失通前三師立三種四種一種同教違祖總同各伸情見競增鬪諍計七十失兼前偽説別教法義有十一失凡八十一失惑亂後學片執師承日增鬬諍於正法門而生邪見斷滅真修故圭山曰為師之難為徒不易仰遵祖訓輒伸警䇿奉勉師徒修真言行期悟心王無勞妄識矣賢首曰菩提大寶性起靈珠既琢既磨資智慧而觀察為調為飾藉萬行以嚴成故求學者以此為日新闡道者以此為法樂琢磨方寸修練行門慧解智明情消性瑩郎然大照鑑無盡之玄門赫矣高升啓難思之妙用卓犖英文懋合聖心可為利物師可行虗己道攝生廣受而不蓄隨機泛應而不流無辜荷笈歲寒豈愧摳衣日久吞金剛種日煉日精植菩提苗益滋益茂解欲彰而行欲備駕説為先道貴振而德貴榮潔己為任直須以至慈為育物以大悲為拯迷以普敬為必和以博施為濟難以無妄為至信以無我為讓誠以無污為戒嚴以無亂以無昧為慧觀以無欲為損貪以無念為滅瞋以無癡利名若浮雲谷響視境色若幻夢空花觖能如是則晈性起之靈珠證菩提之大寶真解現前而塵塵華藏真行成而物物妙嚴不纍境風長新慧刃能福世導俗能敬天威人境佩祖印之常規可作空王之説客故祖誡曰切忌要名聚衆媒衒求達打自大鼓竪我慢幢誇耀於他互生鬪諍銷文釋義唯熾貪瞋口鼓葛藤轉增邪見成羣打開趂隊掠虗端如暗證凡龜恰似盲狗穭吠無沈情見妄識當施性淨心王大限到來神光顯煥苟如言得無爽焉紹興府會稽縣昌源山淨勝教院住持傳賢首教觀門人修寂募緣鏤板庶廣流通時紹熙癸丑上元日謹志
